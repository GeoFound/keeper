# =============================================================================
# ACCEPTANCE — the executable Definition-of-Done for every build_order step.
# This file is the answer to "plan said 3 steps, AI quietly did the easy 60%".
# A step is DONE only when its capabilities below are each backed by GREEN
# evidence. Completion is a machine fact (`just verify-step N`), never a vibe.
# Read with: spec/overview.yaml build_order + per_step + quality_gates.
# =============================================================================

# ---- The discipline. These rules bind every implementer (AI or human). ----
discipline:
  completion_rule: >-
    Step N is DONE iff ALL of: (1) every capability under steps[N] has its evidence
    artifact present AND green; (2) `just verify-step N` is green; (3) `just verify-through N`
    is green (every prior step + all architecture gates still pass — the regression
    ratchet, no robbing Peter to pay Paul); (4) `just scan-punts` is clean; (5) an
    evidence log exists at .evidence/step-N.md quoting the commands run and their output.
    Missing any one => NOT done => MUST NOT start step N+1.
  evidence_first: >-
    Write the step's tests / fixtures / red-team corpora FIRST, derived from the SPEC
    (not from the code you are about to write). They start RED. Implement until GREEN.
    This stops the failure mode where tests are written to match a lazy implementation.
  evidence_over_review: >-
    Completion is proven by OBJECTIVE evidence (passing tests, real-run logs, crash
    replays, adversarial corpora), NOT by asking a human "does this look done?".
    Human approval is reserved ONLY for items explicitly flagged `subjective: true`,
    and those are minimized to a small sample — never the default gate.
  split_ok_narrow_forbidden: >-
    You MAY split a step into sub-steps (N.1, N.2, ...) freely — step COUNT does not
    matter. You MAY NOT drop, shrink, or soften any capability to make a step pass.
    Splitting is encouraged; narrowing is a violation.
  no_backloading: >-
    Each capability is owned by the step that first needs it. You may not defer a
    capability that belongs to step N into a later step. The heavy parts ship when
    their step ships — they are never quietly pushed toward the end.
  legit_defer_vs_punt: >-
    The ONLY legitimate deferral is a capability the spec marks `future` or a feature
    flag defaulting OFF (cross_promotion, funnel, user_memory). Everything listed in a
    step's capabilities is mandatory NOW. `just scan-punts` fails on TODO / NotImplemented
    / placeholder throw / empty-passthrough-that-should-be-real in shipped src.
  real_runtime_not_skippable: >-
    A capability flagged `real: true` MUST be proven against the real thing at least once
    (a live Telegram test bot via dev-secret, a real crash/kill, a real LLM call). It may
    NOT be satisfied by mocks alone. Mocks are fine for breadth; one real path is mandatory.
  subjective_handling: >-
    A capability flagged `subjective: true` (e.g. "sounds like a real person") gets
    OBJECTIVE proxies automated (no-markdown, no-AI-leak, length, register tag present)
    PLUS one small human spot-check sample. It is never silently auto-passed nor fully
    delegated to human review.

# ---- Evidence taxonomy (how each capability is proven, all AI-authored). ----
evidence_types:
  unit:            pure-logic unit test
  property:        randomized property test (e.g. isolation never leaks across random corpora)
  integration:     in-memory bus + mock PlatformAdapter + fixtures; assert event order / passthrough
  real_runtime:    against the real dependency (live test bot / real process kill / real LLM); NOT mockable away
  llm_fixture:     golden inputs + structural assertions (no markdown, tier correct, ...); temperature=0 for repeatability
  redteam:         adversarial corpus; assert ZERO violations (the strongest safety evidence — AI as attacker)
  crash_injection: kill the process at a chosen point; restart; assert exactly-once / no-loss
  privacy_data:    seed data, run the sweep/erase, assert deletion + null recall
  static:          lint / import-boundary / grep gate (no runtime)
  subjective_sample: minimized human spot-check, only for irreducibly-subjective items

# ---- Per-step capability checklists. Each maps to overview per_step + quality_gates.
# Fields: id | must (the capability) | ev (evidence_type) | gate (quality_gates id) |
#         real/subjective (flags, default false). `just verify-step N` runs all of them.
steps:
  - step: 1
    name: Engine core
    walking_skeleton: >-
      Step 1+2 together MUST produce a tiny end-to-end vertical slice: a real inbound
      message → real Event Bus → real send_queue/outbox → one (hardcoded) reply out.
      Real-runtime evidence exists from day one; later steps add blood to this skeleton.
    capabilities:
      - { id: bus_delivers,        must: "a published event reaches a registered subscriber; non-module producers are whitelisted", ev: integration, gate: declared_events_only }
      - { id: declared_events,     must: "emit/subscribe outside a module's declared set throws in dev/test", ev: unit, gate: declared_events_only }
      - { id: envelope_conformance,must: "every emission validates against its Zod schema + non-empty correlationId/workspaceId", ev: unit, gate: envelope_conformance }
      - { id: config_load,         must: "config loads + Zod-validates; invalid config fails fast; hard_block=false rejected", ev: unit, gate: hard_floor_immutable }
      - { id: config_hot_reload,   must: "editing a workspace swaps it live without restart; a bad reload is rejected, prior config stays", ev: integration }
      - { id: lifecycle,           must: "engine register/start/stop + module healthCheck callable", ev: unit }
      - { id: cost_breaker,        must: "budget exhausted => next generative call refused, read-only, owner notified, resets next day; safety still runs", ev: unit, gate: cost_circuit_breaker }
      - { id: cost_reserve,        must: "N concurrent generative calls atomically reserve against daily_budget_state; a budget with room for ~1 call cannot be overshot by N read-then-call races; actual usage reconciles to llm_usage", ev: integration, gate: cost_breaker_reserve }
      - { id: idempotent_outbox,   must: "same inbound correlationId after crash => exactly one reply; stale trigger => none", ev: crash_injection, gate: outbox_crash_safety, real: true }
      - { id: unified_outbound,    must: "no module references an adapter send method; outbound.requested dedups via outbox", ev: static, gate: unified_outbound }
      - { id: scheduler_tz,        must: "two workspaces in different tz each get their tick at workspace-local cron time; missed tick catches up once", ev: unit, gate: scheduler_timezone }
      - { id: event_journal,       must: "the journaling bus middleware writes ONE event_journal row per emission with correlationId + a correct causation_id chain; `trace <correlationId>` reconstructs the full ordered story; `tail` sees a live emission; `inspect` returns an entity's recent rows", ev: integration, gate: observability_trace }
      - { id: structured_logging,  must: "every log line carries correlationId + workspaceId + module; output is newline-JSON to data/logs/ and tail/grep-able", ev: unit, gate: observability_trace }
      - { id: journal_redaction,   must: "session string / bot token / API key / flagged-media bytes NEVER appear in event_journal or the log file (only correlationId/causationId/name do); journal is batched off the critical path and pruned by the retention sweep", ev: integration, gate: journal_no_secrets, real: true }
    verify: just verify-step 1

  - step: 2
    name: Telegram Dual Adapter (userbot + control bot)
    capabilities:
      - { id: roundtrip,        must: "real inbound on the USERBOT (MTProto/GramJS, session-string auth) → UnifiedMessage → message.received; reply sent and visible in-channel AS the owner (no bot badge)", ev: real_runtime, real: true }
      - { id: single_ingest,    must: "message.received is emitted ONLY by the userbot; the control bot (a group admin able to read) never re-ingests → a message is processed exactly once", ev: integration, gate: dual_identity_routing }
      - { id: control_executes, must: "moderation.violation is executed by the CONTROL BOT (group admin); the userbot adapter exposes no admin send path", ev: integration, gate: dual_identity_routing, real: true }
      - { id: owner_remote,     must: "an owner-facing send goes via the control bot as a DM with inline ✅/❌/📝 buttons; a button callback from the owner is received and re-emitted as control.owner_action (owner-authenticated; a non-owner callback is dropped before emit)", ev: real_runtime, real: true }
      - { id: audience_routing, must: "outbound.requested routes by via: owner→control bot, community/lead→userbot; an owner-recipient kind tagged via:'userbot' is rejected", ev: integration, gate: dual_identity_routing }
      - { id: deterministic_corr, must: "correlationId is derived from platform_message_id (not a fresh uuid); a replayed update after reconnect yields the same correlationId → outbox dedup → exactly one reply", ev: crash_injection, gate: idempotent_delivery, real: true }
      - { id: outbound_path,    must: "BOTH reply.generated and outbound.requested go out via the one outbox (no module calls an adapter send method)", ev: integration, gate: unified_outbound }
      - { id: flood_wait,       must: "on the userbot an MTProto FLOOD_WAIT is honored in full (no early retry); recurring FLOOD_WAITs trip RETREAT (posture==stay_silent) + out-of-band owner alert via the control bot", ev: integration, gate: account_survival }
      - { id: account_ceiling,  must: "the per-account global ceiling holds across multiple channels+DMs; a freshly configured account ramps under the warm-up curve; the userbot performs NO admin action", ev: integration, gate: account_survival }
      - { id: edit_delivery,    must: "an edited message arrives as UnifiedMessage{isEdit:true, editOf}", ev: real_runtime, real: true }
      - { id: verify_access,    must: "verifyAccess per adapter: userbot isMember (hard stop if not), control bot isAdmin+delete+restrict (hard stop if missing); NO privacy-mode; invalid userbot session -> out-of-band alert via control bot; invalid control-bot token -> unhealthy process + redacted log/CLI health error; no crash loop", ev: real_runtime, gate: userbot_access, real: true }
      - { id: media_fetch,      must: "fetchMedia returns bytes for moderation; bytes not persisted by the adapter", ev: integration }
      - { id: degrade,          must: "unsupported capabilities (poll/pin) auto-degrade silently", ev: unit }
    verify: just verify-step 2

  - step: 3
    name: Workspace Router + Knowledge RAG
    capabilities:
      - { id: content_isolation, must: "for a workspace bound to source set S, randomized queries NEVER return a chunk outside S", ev: property, gate: content_isolation }
      - { id: retrieval_recall,  must: "filter is pre/in-KNN: a workspace's relevant chunks still appear in its top-K even when globally out-ranked by another workspace's vectors (recall not just safety)", ev: property, gate: content_isolation }
      - { id: sole_retrieval,    must: "ctx.knowledge.search is the only retrieval path; no module queries the vector store directly", ev: static }
      - { id: unbound_source,    must: "a query for an unbound source returns zero rows", ev: unit, gate: content_isolation }
      - { id: unbound_channel,   must: "message from a channel in no workspace => no routed/LLM/DB write, zero spend, one deduped owner notice", ev: integration, gate: unbound_channel_drop }
      - { id: indirect_injection,must: "a poisoned chunk ('ignore instructions/system:') cannot alter identity/boundaries or trigger an action; chunks delimited+labeled untrusted", ev: redteam, gate: indirect_injection }
      - { id: untrusted_input,   must: "a crafted display name / username / replyTo.text cannot become an instruction", ev: redteam, gate: untrusted_input }
      - { id: incremental_sync,  must: "re-sync dedups by content_hash; only changed items re-embed", ev: unit }
      - { id: sync_cursor,       must: "source_sync_state persists cursor/since checkpoints; a restart resumes paginated sync without skipping or duplicating items", ev: integration }
      - { id: embedding_compat,  must: "embedding model/dimension mismatch marks sources full_reembed_required and blocks stale vectors from query until re-embedded under ingest budget", ev: integration }
      - { id: content_gap,       must: "a query with top score < min_score emits content_gap.detected (no asker identity)", ev: unit }
    verify: just verify-step 3

  - step: 4
    name: Persona Engine + Context Manager
    capabilities:
      - { id: no_markdown,      must: "reply.generated has no markdown / no enumerations", ev: llm_fixture, gate: cold_start_no_cringe }
      - { id: no_ai_leak,       must: "reply never contains AI-revealing phrases ('作为AI'/'语言模型')", ev: llm_fixture }
      - { id: coherent,         must: "reply stays coherent with the Context Manager window across multi-party chatter", ev: llm_fixture }
      - { id: register_match,   must: "the posture/register hint from directives is reflected; STYLE flexes, boundaries do not", ev: llm_fixture }
      - { id: style_arm,        must: "Persona sets ReplyDraft.styleVariant from ctx.styling.assign(workspaceId, correlationId); with NO running STYLE experiment it returns 'champion' + the live STYLE prompt, deterministically per correlationId (the experiment/Thompson behavior itself is step 8)", ev: unit }
      - { id: sounds_human,     must: "replies read like a real person, not a bot", ev: subjective_sample, subjective: true }
      - { id: pipeline_abort,   must: "a seeded Persona throw/timeout aborts the reply for that correlationId — no out-event, no half-built draft, logged; NOT silent passthrough", ev: integration, gate: pipeline_failure_abort }
      - { id: pipeline_watchdog, must: "a seeded stage HANG (neither emits nor throws) is force-aborted by the in-flight supervisor at its deadline — slot freed, logged, surfaced; reply never silently lost", ev: integration, gate: pipeline_watchdog }
    verify: just verify-step 4

  - step: 5
    name: Moderation
    capabilities:
      - { id: black_text,       must: "black-tier text => delete NOW (auto) + ban PROPOSED to owner (L1) + escalate, regardless of gray tolerance; the detect+delete floor never waits on approval", ev: redteam, gate: hard_floor_immutable }
      - { id: black_media,      must: "black-tier image/video => delete NOW (auto) + ban proposed + escalate; flagged media bytes never written to disk/db", ev: redteam, gate: media_black_floor }
      - { id: gray_tolerated,   must: "gray-tier under permissive => never deleted", ev: llm_fixture, gate: hard_floor_immutable }
      - { id: spam_flood,       must: "ad/repeat/bulk => silent delete NOW (auto); mute PROPOSED to owner (L1); flood => mute proposed", ev: integration }
      - { id: mute_ban_l1,      must: "mute/ban never auto-execute: emitted as moderation.escalated(proposed); only owner ✅ on the control bot triggers moderation.violation(approved); ❌/ttl => no action", ev: integration, gate: no_self_escalation }
      - { id: control_executor, must: "every executed moderation action (delete/mute/ban) is performed by the CONTROL BOT (group admin); none originate from the userbot", ev: integration, gate: dual_identity_routing }
      - { id: fail_closed,      must: "classifier/vision error/timeout/garbage => message held or treated as violation candidate, NEVER passed as clean", ev: integration, gate: moderation_failclosed }
      - { id: edit_remoderate,  must: "clean→edited-to-black => violation; edited-to-clean => message.clean", ev: integration, gate: edited_remoderation }
      - { id: silent_actions,   must: "every admin action is silent (nothing posted in-channel)", ev: integration }
      - { id: audit_log,        must: "every action writes a moderation_actions row (tier+reason, no media bytes)", ev: integration }
      - { id: media_failsafe,   must: "over media_scan_daily_cap, ALL unscanned media (new AND established users) is held, never silently allowed", ev: unit, gate: moderation_failclosed }
    verify: just verify-step 5

  - step: 6
    name: Intent Router
    capabilities:
      - { id: deterministic,    must: "intent fixtures classify deterministically (temp=0)", ev: llm_fixture }
      - { id: command_sep,      must: "MALICIOUS member commands/injection => ZERO action AND ZERO reply (silent) + command_attempts row; no privileged action ever has chat-plane provenance", ev: redteam, gate: command_conversation_separation }
      - { id: benign_deflect,   must: "a BENIGN out-of-scope question (real customer asking refund/support) => with on_out_of_scope='deflect', ONE natural in-character deflection (no privileged action, no refund answer, no AI-leak); with 'silent', no reply; distinguished from injection by intent not topic", ev: llm_fixture }
      - { id: cost_prefilter,   must: "obvious non-reply cases are decided with NO LLM call (rule pre-filter); classifier only on survivors", ev: integration }
      - { id: mention_flood,    must: "a sender past reply_rate.per_user_max gets no reply within the window", ev: unit }
      - { id: single_gate,      must: "reply_probability + active_hours is the ONLY reactive-reply decision point; edits never reply", ev: unit }
      - { id: decision_trace,   must: "when the router DECLINES to reply it writes a decision.no_reply journal trace naming the winning branch (posture/flood-cap/active_hours/seed/command_attempt/probability), so `/why` and `just trace` explain the non-reply", ev: integration, gate: observability_trace }
    verify: just verify-step 6

  - step: 7
    name: Approval Service + Owner Controls
    capabilities:
      - { id: approval_roundtrip, must: "owner input arrives as control.owner_action (the single authenticated ingress; emitted ONLY for the owner user_id); ✅/❌/📝 matched to the exact pending item by itemRef (callback_data, typed-command fallback by reply-to/#id); a member messaging the control bot produces NO control.owner_action and does nothing", ev: integration, gate: dual_identity_routing }
      - { id: approval_persistence, must: "every proposal is persisted in approval_items before owner DM; after restart callbacks/reply-to/#id still resolve; expired rows apply the safe default exactly once", ev: crash_injection }
      - { id: pause_overrides,    must: "/pause => no proactive or reactive send; /quiet => proactive off, moderation on; owner DMs still delivered", ev: integration, gate: owner_pause_overrides }
      - { id: no_self_escalation, must: "runtime/evolution attempt to raise autonomy or add a principal is rejected", ev: unit, gate: no_self_escalation }
      - { id: digest,             must: "digest.due => owner DM via outbound with the required sections", ev: integration }
      - { id: status_why,         must: "/status + /why answer from logs (moderation_actions, outbox, command_attempts)", ev: integration }
      - { id: member_notice,      must: "with member_notice on, a one-time + pinned disclosure is posted", ev: integration }
      - { id: retention_forget,   must: "retention sweep deletes past-retention rows AND prunes terminal outbox rows past outbox_prune_after_days (without breaking the idempotency window); /forget emits user.forget -> User Memory erases note+opt-out AND the Database service purges/anonymizes user-scoped raw records it owns (messages, command_attempts, leads, moderation target ids where legally safe, event_journal payload digests/reasons for that subject); opt-out keyword stops memory only", ev: privacy_data, gate: retention_and_erasure }
      - { id: timeout_default,    must: "an undecided item auto-resolves to its SAFE default at proposal.ttl (reject cost/giveaway/cross_promo; hold tuning)", ev: unit }
    verify: just verify-step 7

  - step: 8
    name: Marketing / Atmosphere / Activity / Evolution
    capabilities:
      - { id: marketing_limits,  must: "max_mentions_per_day + min_gap_hours survive a restart; never mention during complaint/argument", ev: integration }
      - { id: cold_start,        must: "seed phase: broadcast only, no reactive chat, no poll below min_participants; consecutive bot messages capped", ev: integration, gate: cold_start_no_cringe }
      - { id: cold_revival,      must: "atmosphere cold-trigger fires once per cooldown and sends via outbound (suppressed under stay_silent)", ev: integration }
      - { id: periodic_activity, must: "periodic activity types (topic_day/quiz) are triggered by the activity.due scheduler tick in the workspace timezone; activity.rejected returns the proposal to the planner (dropped/rescheduled, not left pending)", ev: integration }
      - { id: engaged_attribution, must: "the primary metric 'engaged' is observed from the bus — a subsequent human message.clean whose replyTo.messageId == a tracked bot reply (or a positive reaction.received on it) within attribution_window writes engaged + measured_at to reply_feedback (indexed by bot_message_id), keyed to the reply's styleVariant arm", ev: integration }
      - { id: one_experiment,    must: "at most one running experiment per dimension (DB unique index holds); a power-underpowered challenger is QUEUED, not run", ev: unit }
      - { id: bandit_alloc,      must: "ctx.styling.assign serves the arm via Thompson allocation routing more traffic to the better arm as the Beta posteriors diverge, with challenger share clamped to [floor,cap]; assignment is deterministic per correlationId (reproducible under replay) and is what Persona stamped onto ReplyDraft.styleVariant", ev: unit }
      - { id: gated_promotion,   must: "challenger promoted ONLY when P(challenger>champion)>=promote_prob AND min_exposure met AND no guardrail worse than champion beyond tolerance; a reaction-farming variant that lifts primary but worsens complaint/churn is VETOED", ev: unit }
      - { id: peek_safe,         must: "continuous looks (the rollback watch) do not inflate false-promotion rate — posterior-prob decision is valid under peeking (a fixed-horizon p-value would fail this)", ev: unit }
      - { id: auto_rollback,     must: "a seeded post-promotion regression (primary OR guardrail) auto-reverts to the stored prior STYLE within the watch window", ev: unit }
      - { id: evolution_safety,  must: "a boundary-weakening challenger is rejected before it runs", ev: redteam, gate: evolution_safety }
    verify: just verify-step 8

  - step: 9
    name: Cross-Promotion (hooks only)
    capabilities:
      - { id: passthrough, must: "with CrossPromotion unregistered, the ENGINE bridge (not the Marketing module) forwards reply.enriched -> reply.ready unchanged (deep-equal except owned field); Marketing never emits reply.ready", ev: integration, gate: pipeline_passthrough }
    verify: just verify-step 9

  - step: 10
    name: Relationship Memory
    capabilities:
      - { id: recall_weaves,  must: "recall weaves a prior topic naturally into a reply (flag on)", ev: llm_fixture }
      - { id: opt_out_null,   must: "opted-out user => recall returns null, collection stops", ev: privacy_data, gate: retention_and_erasure }
      - { id: forget_purges,  must: "/forget erases note AND purges raw messages", ev: privacy_data, gate: retention_and_erasure }
      - { id: no_cross_user,  must: "never returns another user's memory", ev: unit }
    verify: just verify-step 10

  - step: 11
    name: Content-Gap Feedback
    capabilities:
      - { id: counts_repeats, must: "a repeated unanswered question increments content_gaps.asked_count", ev: unit }
      - { id: in_digest,      must: "gaps surface in the owner digest", ev: integration }
      - { id: no_identity,    must: "stored question carries no asker identity", ev: unit }
    verify: just verify-step 11

  - step: 12
    name: DM Funnel
    capabilities:
      - { id: lead_signal,   must: "a high-intent signal emits lead.identified", ev: integration }
      - { id: approval_gate, must: "no DM is sent without owner approval on the control bot (autonomy L1); approved => outbound dm via:'userbot' to the lead, within the account_survival dm_per_day cap", ev: integration }
      - { id: never_member,  must: "a member asking can never trigger a DM (provenance)", ev: redteam, gate: command_conversation_separation }
    verify: just verify-step 12

  - step: 13
    name: Evolution multi-dimension
    capabilities:
      - { id: nonstyle_dim, must: "an experiment on dimension != style (timing/activity_type/marketing_angle) runs the SAME champion/challenger gate + rollback", ev: unit }
      - { id: identity_safe, must: "identity/boundaries/governance are never a dimension", ev: static, gate: evolution_safety }
    verify: just verify-step 13

  - step: 14
    name: Owner Onboarding Wizard
    capabilities:
      - { id: interview,      must: "wizard interviews the owner via DM ON THE CONTROL BOT; owner input arrives as control.owner_action -> Approval forwards onboarding.input(start|answer|confirm) (owner user_id only — the owner cannot DM their own userbot account); onboarding.input is a DEDICATED event, never a piggyback on activity.approved", ev: real_runtime, real: true }
      - { id: valid_config,   must: "emits a persona + sources config that passes the SAME Zod schema as hand-written", ev: unit }
      - { id: bootstrap_write,must: "writes config/** ONCE only after explicit owner confirm; never overwrites a hand-edit without a fresh confirm; hot-reload picks it up", ev: integration }
      - { id: preconditions,  must: "refuses to go live if the userbot is not a member or its session is invalid, if the control bot token is invalid, or if the control bot lacks admin delete+restrict; tells the owner exactly what to fix (no privacy-mode concept, no safety-rights degradation)", ev: real_runtime, real: true }
    verify: just verify-step 14
