# =============================================================================
# ACCEPTANCE — the executable Definition-of-Done for every build_order step.
# This file is the answer to "plan said 3 steps, AI quietly did the easy 60%".
# A step is DONE only when its capabilities below are each backed by GREEN
# evidence. Completion is a machine fact (`just verify-step N`), never a vibe.
# Read with: spec/overview.yaml build_order + per_step + quality_gates.
# =============================================================================

# ---- The discipline. These rules bind every implementer (AI or human). ----
discipline:
  completion_rule: >-
    Step N is DONE iff ALL of: (1) every capability under steps[N] has its evidence
    artifact present AND green; (2) `just verify-step N` is green; (3) `just verify-through N`
    is green (every prior step + all architecture gates still pass — the regression
    ratchet, no robbing Peter to pay Paul); (4) `just scan-punts` is clean; (5) an
    evidence log exists at .evidence/step-N.md quoting the commands run and their output.
    Missing any one => NOT done => MUST NOT start step N+1.
  evidence_first: >-
    Write the step's tests / fixtures / red-team corpora FIRST, derived from the SPEC
    (not from the code you are about to write). They start RED. Implement until GREEN.
    This stops the failure mode where tests are written to match a lazy implementation.
  evidence_over_review: >-
    Completion is proven by OBJECTIVE evidence (passing tests, real-run logs, crash
    replays, adversarial corpora), NOT by asking a human "does this look done?".
    Human approval is reserved ONLY for items explicitly flagged `subjective: true`,
    and those are minimized to a small sample — never the default gate.
  real_evidence_layering: >-
    Real integrations that need credentials or interactive platform state are split into
    deterministic local contract evidence plus a small required real smoke, with the full
    real end-to-end path moved to the production/nightly track. This keeps local iteration
    unblocked without weakening reality: a step may not claim real coverage from mocks, but
    `just verify-step N` should run the simulator/contract suite fast, while `just verify-real
    step-N` records the credential-gated smoke evidence when secrets are available.
  split_ok_narrow_forbidden: >-
    You MAY split a step into sub-steps (N.1, N.2, ...) freely — step COUNT does not
    matter. You MAY NOT drop, shrink, or soften any capability to make a step pass.
    Splitting is encouraged; narrowing is a violation.
  no_backloading: >-
    Each capability is owned by the step that first needs it. You may not defer a
    capability that belongs to step N into a later step. The heavy parts ship when
    their step ships — they are never quietly pushed toward the end.
  legit_defer_vs_punt: >-
    The ONLY legitimate deferral is a capability the spec marks `future` or a feature
    flag defaulting OFF (cross_promotion, funnel, user_memory). Everything listed in a
    step's capabilities is mandatory NOW. `just scan-punts` fails on TODO / NotImplemented
    / placeholder throw / empty-passthrough-that-should-be-real in shipped src.
  real_runtime_not_skippable: >-
    A capability flagged `real: true` MUST be proven against the real thing at least once
    (a live Telegram test bot via dev-secret, a real crash/kill, a real LLM call). It may
    NOT be satisfied by mocks alone. Mocks are fine for breadth; one real path is mandatory.
  subjective_handling: >-
    A capability flagged `subjective: true` (e.g. "sounds like a real person") gets
    OBJECTIVE proxies automated (no-markdown, no-AI-leak, length, register tag present)
    PLUS one small human spot-check sample. It is never silently auto-passed nor fully
    delegated to human review.

# ---- Evidence taxonomy (how each capability is proven, all AI-authored). ----
evidence_types:
  unit:            pure-logic unit test
  property:        randomized property test (e.g. isolation never leaks across random corpora)
  integration:     in-memory bus + mock PlatformAdapter + fixtures; assert event order / passthrough
  adapter_contract: simulator over normalized Telegram update/callback/edit/access fixtures using the real GramJS/grammY type boundary, no credentials
  real_runtime:    against the real dependency (live test bot / real process kill / real LLM); NOT mockable away
  real_smoke:      minimal credential-gated live path proving login, send/receive, callback, edit, and access preflight once per environment
  llm_fixture:     golden inputs + structural assertions (no markdown, tier correct, ...); temperature=0 for repeatability
  redteam:         adversarial corpus; assert ZERO violations (the strongest safety evidence — AI as attacker)
  crash_injection: kill the process at a chosen point; restart; assert exactly-once / no-loss
  privacy_data:    seed data, run the sweep/erase, assert deletion + null recall
  static:          lint / import-boundary / grep gate (no runtime)
  subjective_sample: minimized human spot-check, only for irreducibly-subjective items

# ---- Per-step capability checklists. Each maps to overview per_step + quality_gates.
# Fields: id | must (the capability) | ev (evidence_type) | gate (quality_gates id) |
#         real/subjective (flags, default false). `just verify-step N` runs all of them.
steps:
  - step: 1
    name: Engine core
    walking_skeleton: >-
      Step 1+2 together MUST produce a tiny end-to-end vertical slice: a real inbound
      message → real Event Bus → real send_queue/outbox → one (hardcoded) reply out.
      Real-runtime evidence exists from day one; later steps add blood to this skeleton.
    capabilities:
      - { id: bus_delivers,        must: "a published event reaches a registered subscriber; non-module producers are whitelisted", ev: integration, gate: declared_events_only }
      - { id: declared_events,     must: "emit/subscribe outside a module's declared set throws in dev/test", ev: unit, gate: declared_events_only }
      - { id: envelope_conformance,must: "every catalog event has an explicit payload schema and every emission validates against its Zod schema + non-empty correlationId; non-empty workspaceId required except the scope-deferred pair (message.received/control.owner_action) and the source-scoped pair (knowledge.sync_due/knowledge.updated), which instead require a non-empty payload sourceId; a workspace-scoped event with empty workspaceId and a source-scoped event with empty sourceId are both rejected", ev: unit, gate: envelope_conformance }
      - { id: config_load,         must: "config loads + Zod-validates; invalid config fails fast; hard_block=false rejected", ev: unit, gate: hard_floor_immutable }
      - { id: config_uniqueness,   must: "duplicate workspace ids, source ids, channel bindings, missing content_sources, bad id charset, and reserved __system__ workspace bindings are rejected at load/reload", ev: unit, gate: config_uniqueness }
      - { id: llm_output_isolation,must: "LLM gateway returns advisory typed data only; parsed outputs cannot emit bus events, mutate config/db, call adapters, or choose autonomy except through policy wrappers", ev: static, gate: llm_output_isolation }
      - { id: config_hot_reload,   must: "editing a workspace swaps it live without restart; a bad reload is rejected, prior config stays", ev: integration }
      - { id: lifecycle,           must: "engine register/start/stop + module healthCheck callable", ev: unit }
      - { id: minimum_launch_profile, must: "default config launches in conservative mode: evolution/funnel/cross_promotion/user_memory off, proactive frequency low, high-risk capabilities owner-ramped", ev: unit, gate: minimum_launch_profile }
      - { id: cost_breaker,        must: "budget exhausted => next generative call refused, read-only, owner notified, resets next day; safety still runs in its own lane", ev: unit, gate: cost_circuit_breaker }
      - { id: safety_budget_lane,  must: "generative + safety/media budgets are per-workspace and independent; ingest is a SEPARATE per-SOURCE lane (ingest_budget_state) so a shared source's re-embed never draws from or starves a workspace's chat lane; media safety exhaustion creates runtime mode media_hold, applies config.media_hold_mode, and reports owner-visible status instead of silently allowing media; llm_usage records workspace and source scopes correctly", ev: unit, gate: safety_budget_media_hold }
      - { id: cost_reserve,        must: "N concurrent generative calls atomically reserve against daily_budget_state; a budget with room for ~1 call cannot be overshot by N read-then-call races; actual usage reconciles to llm_usage scope_type='workspace'; ingest usage reconciles to scope_type='source'; a FAILED/timed-out/aborted call RELEASES its reservation (reserved returns to ~0, no actual booked) so phantom reservations never accumulate into a false read_only; the day row upserts once under a rollover race", ev: integration, gate: cost_breaker_reserve }
      - { id: idempotent_outbox,   must: "same inbound correlationId after crash => exactly one reply; stale trigger => none", ev: crash_injection, gate: outbox_crash_safety, real: true }
      - { id: inbound_crash_recovery, must: "inbound_updates tracks pending->committed; delivery is decided by status + the process in-flight set (committed=stop, pending-in-flight=drop duplicate, pending-from-a-crashed-process=re-journey). A crash AFTER the messages row but BEFORE any outbox row is RE-DRIVEN from the messages row on restart; a crash BEFORE the messages row is recovered by the platform replay re-journeying (rule 3, no re-drive possible). Both process the message EXACTLY ONCE — not lost, not doubled, no deadlock — so the pre-outbox half of the journey is as crash-safe as the send half", ev: crash_injection, gate: idempotent_delivery, real: true }
      - { id: unified_outbound,    must: "no module references an adapter send method; outbound.requested dedups via outbox", ev: static, gate: unified_outbound }
      - { id: scheduler_tz,        must: "two workspaces in different tz each get their tick at workspace-local cron time; missed tick catches up once", ev: unit, gate: scheduler_timezone }
      - { id: event_journal,       must: "the journaling bus middleware writes ONE event_journal row per emission with correlationId + a correct causation_id chain; `trace <correlationId>` reconstructs the full ordered story; `tail` sees a live emission; `inspect` returns an entity's recent rows", ev: integration, gate: observability_trace }
      - { id: structured_logging,  must: "every log line carries correlationId + workspaceId + module; output is newline-JSON to data/logs/ and tail/grep-able", ev: unit, gate: observability_trace }
      - { id: journal_privacy_layers, must: "event_journal preserves audit skeleton while /forget redacts user payload digests and raw messages are deleted by retention; trace remains explainable without user text; the /forget subject sweep is COMPLETE because every user-concerning event carries envelope.subjectUserId (stamped to event_journal.subject_user_id), not a middleware guess — a user-text row that omitted the subject is, by contract, not about that subject", ev: privacy_data, gate: journal_privacy_layers }
      - { id: journal_redaction,   must: "session string / bot token / API key / flagged-media bytes NEVER appear in event_journal or the log file (only correlationId/causationId/name do); journal is batched off the critical path and pruned by the retention sweep", ev: integration, gate: journal_no_secrets, real: true }
    verify: just verify-step 1

  - step: 2
    name: Telegram Dual Adapter (userbot + control bot)
    evidence_ladder: >-
      Local development runs the adapter contract simulator: synthetic MTProto/Bot API
      updates/callbacks/edits/access results through the real normalized boundary. Step
      evidence also includes a small `just verify-real step-2` live smoke using dev-secret.
      The exhaustive live Telegram E2E matrix is a production/nightly gate, not the hot
      local loop.
    capabilities:
      - { id: contract_simulator, must: "synthetic GramJS/grammY message, callback, edit, media, FLOOD_WAIT, and access fixtures map through the normalized adapter boundary with no credentials", ev: adapter_contract, gate: telegram_adapter_evidence_ladder }
      - { id: roundtrip,        must: "simulated inbound on the USERBOT boundary → UnifiedMessage → message.received; reply routes to userbot and is shaped as an owner-account message (no bot-badge assumptions in core)", ev: adapter_contract, gate: telegram_adapter_evidence_ladder }
      - { id: single_ingest,    must: "message.received is emitted ONLY by the userbot; the control bot (a group admin able to read) never re-ingests → a message is processed exactly once; the userbot ALSO drops any inbound whose sender is its OWN account (the bot's automated sends AND the owner's manual messages) before emit — no self-moderation/reply-to-self, and bot-message accounting still comes only from reply.sent/outbound.sent", ev: integration, gate: dual_identity_routing }
      - { id: control_executes, must: "moderation.violation is executed by the CONTROL BOT (group admin); the userbot adapter exposes no admin send path", ev: integration, gate: dual_identity_routing }
      - { id: owner_remote,     must: "an owner-facing send goes via the control bot as a DM with inline ✅/❌/📝 buttons; a simulated owner callback is re-emitted as control.owner_action (owner-authenticated; a non-owner callback is dropped before emit)", ev: adapter_contract, gate: telegram_adapter_evidence_ladder }
      - { id: audience_routing, must: "outbound.requested routes by via: owner→control bot, community/lead→userbot; an owner-recipient kind tagged via:'userbot' is rejected", ev: integration, gate: dual_identity_routing }
      - { id: deterministic_corr, must: "correlationId is derived from platform_message_id (not a fresh uuid); a replayed update after reconnect yields the same correlationId → outbox dedup → exactly one reply", ev: crash_injection, gate: idempotent_delivery }
      - { id: outbound_path,    must: "BOTH reply.generated and outbound.requested go out via the one outbox (no module calls an adapter send method)", ev: integration, gate: unified_outbound }
      - { id: flood_wait,       must: "on the userbot an MTProto FLOOD_WAIT is honored in full (no early retry); recurring FLOOD_WAITs trip RETREAT (posture==stay_silent) + out-of-band owner alert via the control bot", ev: integration, gate: account_survival }
      - { id: account_ceiling,  must: "the per-account global ceiling holds across multiple channels+DMs; a freshly configured account ramps under the warm-up curve; the userbot performs NO admin action", ev: integration, gate: account_survival }
      - { id: edit_delivery,    must: "an edited update fixture arrives as UnifiedMessage{isEdit:true, editOf}; replay of the same edit revision is deduped, a later edit revision re-moderates", ev: adapter_contract, gate: telegram_adapter_evidence_ladder }
      - { id: verify_access,    must: "verifyAccess per adapter: userbot isMember (hard stop if not), control bot isAdmin+delete+restrict (hard stop if missing); NO privacy-mode; invalid userbot session -> out-of-band alert via control bot; invalid control-bot token -> unhealthy process + redacted log/CLI health error; no crash loop", ev: adapter_contract, gate: userbot_access }
      - { id: runtime_access_loss, must: "a RUNTIME loss of a required right surfaces, never a silent stop: a userbot kicked from a channel (CHAT_FORBIDDEN/USER_NOT_PARTICIPANT) writes an active channel-scoped workspace_runtime_state row mode=degraded, reason=userbot_not_member + owner alert via the control bot, degrading only that channel (distinct from account-wide RETREAT); a control-bot admin right revoked at runtime enters workspace-scoped safety_hold/read_only + owner alert", ev: integration, gate: userbot_access }
      - { id: live_smoke,       must: "credential-gated smoke proves real userbot login, real send/receive, real control-bot callback, real edit delivery, and real verifyAccess once; output is recorded in .evidence without secrets", ev: real_smoke, gate: telegram_adapter_evidence_ladder, real: true }
      - { id: media_fetch,      must: "ctx.media.fetch returns bytes for moderation by delegating to the inbound (userbot) adapter's fetchMedia; no module calls the adapter directly (zero_coupling); bytes are not persisted; a fetch failure surfaces so Moderation can fail closed", ev: integration }
      - { id: degrade,          must: "unsupported capabilities (poll/pin) auto-degrade silently", ev: unit }
    verify: just verify-step 2

  - step: 3
    name: Workspace Router + Knowledge RAG
    capabilities:
      - { id: content_isolation, must: "for a workspace bound to source set S, randomized queries NEVER return a chunk outside S", ev: property, gate: content_isolation }
      - { id: retrieval_recall,  must: "filter is pre/in-KNN: a workspace's relevant chunks still appear in its top-K even when globally out-ranked by another workspace's vectors (recall not just safety)", ev: property, gate: content_isolation }
      - { id: sole_retrieval,    must: "ctx.knowledge.search is the only retrieval path; no module queries the vector store directly", ev: static }
      - { id: unbound_source,    must: "a query for an unbound source returns zero rows", ev: unit, gate: content_isolation }
      - { id: unbound_channel,   must: "message from a channel in no workspace => no routed/LLM/workspace-domain DB write, zero spend, one deduped owner notice; the only allowed DB side effects are pre-routing inbound_updates idempotency bookkeeping and the __system__ notice/outbox trace", ev: integration, gate: unbound_channel_drop }
      - { id: indirect_injection,must: "a poisoned chunk ('ignore instructions/system:') cannot alter identity/boundaries or trigger an action; chunks delimited+labeled untrusted", ev: redteam, gate: indirect_injection }
      - { id: untrusted_input,   must: "a crafted display name / username / replyTo.text cannot become an instruction", ev: redteam, gate: untrusted_input }
      - { id: incremental_sync,  must: "re-sync dedups by content_hash; only changed items re-embed", ev: unit }
      - { id: sync_cursor,       must: "knowledge.sync_due fires PER SOURCE (carrying ScheduledTick.sourceId, empty workspaceId — source-scoped envelope); source_sync_state persists cursor/since checkpoints; a restart resumes paginated sync without skipping or duplicating items", ev: integration }
      - { id: embedding_compat,  must: "embedding model/dimension mismatch marks sources full_reembed_required and blocks stale vectors from query until re-embedded under ingest budget", ev: integration }
      - { id: freshness_trust,   must: "retrieval ranking and answer grounding use sourceTrust, freshness/updatedAt, contentType, canonicalUrl, and workspacePriority; stale or low-trust hits are downgraded or surfaced as gaps", ev: unit, gate: knowledge_freshness_trust }
      - { id: content_gap,       must: "a query with top score < min_score emits content_gap.detected (no asker identity)", ev: unit }
    verify: just verify-step 3

  - step: 4
    name: Persona Engine + Context Manager
    capabilities:
      - { id: no_markdown,      must: "reply.generated has no markdown / no enumerations", ev: llm_fixture, gate: cold_start_no_cringe }
      - { id: no_ai_leak,       must: "ordinary replies never contain AI-revealing phrases ('作为AI'/'我是语言模型') or model/system/vendor details", ev: llm_fixture, gate: persona_transparency_boundary }
      - { id: direct_automation_question, must: "a direct 'are you automated' question gets only the approved one-line natural disclosure aligned with the member notice; no model/system/vendor detail and no privileged action", ev: llm_fixture, gate: persona_transparency_boundary }
      - { id: coherent,         must: "reply stays coherent with the Context Manager window across multi-party chatter", ev: llm_fixture }
      - { id: register_match,   must: "the posture/register hint from directives is reflected; STYLE flexes, boundaries do not", ev: llm_fixture }
      - { id: brand_safety,     must: "high-risk/brand-sensitive topics deflect lightly, heated/argument posture observes, marketing is suppressed during complaints, and /why can explain why the reply was allowed", ev: redteam, gate: persona_brand_safety }
      - { id: style_arm,        must: "Persona sets ReplyDraft.styleVariant from ctx.styling.assign(workspaceId, correlationId); with NO running STYLE experiment it returns 'champion' + the live STYLE prompt, deterministically per correlationId (the experiment/Thompson behavior itself is step 8)", ev: unit }
      - { id: sounds_human,     must: "replies read like a real person, not a bot", ev: subjective_sample, subjective: true }
      - { id: pipeline_abort,   must: "a seeded Persona throw/timeout aborts the reply for that correlationId — no out-event, no half-built draft, logged; NOT silent passthrough", ev: integration, gate: pipeline_failure_abort }
      - { id: pipeline_watchdog, must: "a seeded stage HANG (neither emits nor throws) is force-aborted by the in-flight supervisor at its deadline — slot freed, logged, surfaced; reply never silently lost. The deadline is >= (stage count × stage_timeout) + margin, so a legit slow reply where every stage stays within its own timeout is NOT force-aborted (config 150s for 4×30s); the loader rejects a deadline that violates this", ev: integration, gate: pipeline_watchdog }
    verify: just verify-step 4

  - step: 5
    name: Moderation
    capabilities:
      - { id: black_text,       must: "black-tier text => delete NOW (auto) + ban PROPOSED to owner (L1) + escalate, regardless of gray tolerance; the detect+delete floor never waits on approval", ev: redteam, gate: hard_floor_immutable }
      - { id: black_media,      must: "black-tier image/video => delete NOW (auto) + ban proposed + escalate; flagged media bytes never written to disk/db", ev: redteam, gate: media_black_floor }
      - { id: gray_tolerated,   must: "gray-tier under permissive => never deleted", ev: llm_fixture, gate: hard_floor_immutable }
      - { id: spam_flood,       must: "ad/repeat/bulk => silent delete NOW (auto); mute PROPOSED to owner (L1); flood => mute proposed", ev: integration }
      - { id: new_user_delay,   must: "a user with no channel_members row or first_seen_at within new_user_link/media_delay_minutes cannot post links/media (enforced via ctx.social.memberPresence); after the window an established user is unrestricted; presence is written on member.joined and on first message.clean when join was missed", ev: integration }
      - { id: mute_ban_l1,      must: "mute/ban never auto-execute: emitted as moderation.escalated(proposed); the moderation approval kernel persists approval_items before owner DM, matches owner ✅/❌ callbacks from the control bot, emits moderation.violation(approved) only on ✅, and applies ❌/ttl safe-default reject exactly once with no action", ev: integration, gate: approval_safe_defaults }
      - { id: control_executor, must: "every executed moderation action (delete/mute/ban) is performed by the CONTROL BOT (group admin); none originate from the userbot", ev: integration, gate: dual_identity_routing }
      - { id: action_idempotent, must: "a replayed/redelivered moderation.violation (same correlationId+action+target) executes the admin action EXACTLY ONCE — the executor claims moderation_actions.action_key (UNIQUE) before the platform call; no double-ban/double-mute across a reconnect/crash", ev: crash_injection, gate: moderation_failclosed }
      - { id: mod_cost_prefilter, must: "a deterministic non-LLM rule pre-filter (spam_keywords/link/flood/bulk-join/new-user-delay/obvious-clean) resolves the BULK of benign text with NO safety-lane LLM call; the text/vision classifier runs only on suspect/ambiguous survivors + the black-tier check; the pre-filter keeps working under read_only AND under safety-lane exhaustion, so a busy room of benign traffic does not exhaust the safety lane or go dark", ev: integration, gate: moderation_failclosed }
      - { id: fail_closed,      must: "text/vision classifier error/timeout/garbage OR a ctx.media.fetch download failure => message held or treated as violation candidate, NEVER passed as clean", ev: integration, gate: moderation_failclosed }
      - { id: edit_remoderate,  must: "clean→edited-to-black => violation; edited-to-clean => message.clean", ev: integration, gate: edited_remoderation }
      - { id: silent_actions,   must: "every admin action is silent (nothing posted in-channel)", ev: integration }
      - { id: audit_log,        must: "every action writes a moderation_actions row (tier+reason, no media bytes)", ev: integration }
      - { id: media_failsafe,   must: "over media_scan_daily_cap, ALL unscanned media (new AND established users) is held, never silently allowed", ev: unit, gate: moderation_failclosed }
      - { id: safety_hold_queue,must: "classifier outage/media cap holds are silent to members, deduped by user/reason, summarized in owner digest/status, have a TTL, and expire to the declared safe default without noisy proposals", ev: integration, gate: safety_hold_queue }
    verify: just verify-step 5

  - step: 6
    name: Intent Router
    capabilities:
      - { id: deterministic,    must: "intent fixtures classify deterministically (temp=0)", ev: llm_fixture }
      - { id: command_sep,      must: "MALICIOUS member commands/injection => ZERO action AND ZERO reply (silent) + command_attempts row; no privileged action ever has chat-plane provenance", ev: redteam, gate: command_conversation_separation }
      - { id: benign_deflect,   must: "a BENIGN out-of-scope question (real customer asking refund/support) => with on_out_of_scope='deflect', ONE natural in-character deflection (no privileged action, no refund answer, no AI-leak); with 'silent', no reply; distinguished from injection by intent not topic", ev: llm_fixture }
      - { id: cost_prefilter,   must: "obvious non-reply cases are decided with NO LLM call (rule pre-filter); classifier only on survivors", ev: integration }
      - { id: mention_flood,    must: "a sender past reply_rate.per_user_max gets no reply within the window", ev: unit }
      - { id: member_suppression, must: "phrases like '别回复我/别私信我/别记我' set reply/dm/memory suppression scopes THROUGH ctx.suppression (no module writes member_suppression directly), stop future matching behavior, and are visible to /why without replying to malicious commands", ev: integration, gate: suppression_complaint_loop }
      - { id: single_gate,      must: "reply_probability + active_hours is the ONLY reactive-reply decision point; edits never reply", ev: unit }
      - { id: decision_trace,   must: "when the router DECLINES to reply it writes a decision.no_reply journal trace naming the winning branch (posture/flood-cap/active_hours/seed/command_attempt/probability), so `/why` and `just trace` explain the non-reply", ev: integration, gate: observability_trace }
    verify: just verify-step 6

  - step: 7
    name: Approval Service + Owner Controls
    capabilities:
      - { id: approval_roundtrip, must: "owner input arrives as control.owner_action (the single authenticated ingress; emitted ONLY for the owner user_id); ✅/❌/📝 matched to the exact pending item by itemRef (callback_data, typed-command fallback by reply-to/#id); a member messaging the control bot produces NO control.owner_action and does nothing", ev: integration, gate: dual_identity_routing }
      - { id: approval_persistence, must: "every proposal is persisted in approval_items before owner DM; after restart callbacks/reply-to/#id still resolve; expired rows apply the per-type safe default exactly once", ev: crash_injection, gate: approval_safe_defaults }
      - { id: pause_overrides,    must: "/pause (paused_until) => posture==stay_silent: NO proactive AND NO reactive send; /quiet (proactive_paused_until) => RoomRead.proactiveAllowed=false: proactive suppressed while a reactive reply AND moderation still run and posture is unchanged; owner DMs delivered under both. Assert the two levers are independent (a /quiet'd channel still answers a direct question; a /pause'd one does not)", ev: integration, gate: owner_pause_overrides }
      - { id: no_self_escalation, must: "runtime/evolution attempt to raise autonomy or add a principal is rejected", ev: unit, gate: no_self_escalation }
      - { id: digest,             must: "digest.due => owner DM via outbound with the required sections", ev: integration }
      - { id: status_why,         must: "/status + /why answer from logs (moderation_actions, outbox, command_attempts)", ev: integration }
      - { id: member_notice,      must: "with member_notice on, a one-time + pinned disclosure is posted with dedupeKey `notice:<channel>`; it posts at go-live (wizard) OR on the first join, whichever fires first, and is NEVER re-posted on a later join — the kind='notice' outbox row is prune-exempt so the once-ever guarantee survives an outbox sweep", ev: integration }
      - { id: retention_forget,   must: "retention sweep deletes past-retention rows AND prunes terminal outbox rows past outbox_prune_after_days (without breaking the idempotency window); /forget emits user.forget -> the User Memory privacy endpoint erases note+opt-out even if recall/collection is still feature-off until step 10, AND the Database service purges/anonymizes user-scoped raw records it owns (messages, command_attempts, leads, moderation target ids where legally safe, event_journal payload digests/reasons for that subject); opt-out keyword stops memory only", ev: privacy_data, gate: retention_and_erasure }
      - { id: suppression_controls, must: "owner /mute-bot-for-user and /unmute-bot-for-user set/clear suppression scopes via ctx.suppression; negative reactions from negative_feedback_quiet_threshold DISTINCT users within negative_feedback_window_minutes automatically trigger quiet posture (one user reacting repeatedly does not) and it is explained in /status", ev: integration, gate: suppression_complaint_loop }
      - { id: timeout_default,    must: "an undecided item auto-resolves at proposal.ttl using the declared safe-default table: punitive/cost/DM/cross-promo rejected, tuning held, onboarding cancelled, low-risk activity dropped; proposal.ttl resolves from config.approvals.proposal_ttl_hours (+ per_type_ttl_hours overrides) and expires_at is computed (created_at + ttl) at proposal creation so the timeout survives restarts and applies exactly once", ev: unit, gate: approval_safe_defaults }
    verify: just verify-step 7

  - step: 8
    name: Marketing / Atmosphere / Activity / Evolution
    capabilities:
      - { id: marketing_limits,  must: "max_mentions_per_day + min_gap_hours survive a restart; never mention during complaint/argument", ev: integration }
      - { id: marketing_proactive_share, must: "the proactive_share strategy fires on the marketing.share_due tick in the workspace tz, ONLY when phase>=grow and posture allows, within max_mentions_per_day/min_gap_hours, and sends via outbound.requested(kind:'proactive_post', via:'userbot', suppressIfKillSwitch=true) — suppressed under seed/spark, stay_silent, or account RETREAT; it never calls the adapter directly; it does NOT double-post with Atmosphere's content_calendar.due", ev: integration }
      - { id: suppression_quiet, must: "complaints/negative reactions from negative_feedback_quiet_threshold DISTINCT users within negative_feedback_window_minutes (tracked in channel_negative_signals) automatically reduce reply/proactive frequency or set quiet posture before evolution can optimize engagement; the tally degrades gracefully with sentiment_analysis OFF (phrases + negative_reaction_emojis alone suffice)", ev: integration, gate: suppression_complaint_loop }
      - { id: cold_start,        must: "seed phase: broadcast only, no reactive chat, no poll below min_participants; consecutive bot messages capped — the cap is enforced ATOMICALLY at the userbot send-queue dequeue (not racy per-producer pre-reads), so N concurrent proactive producers reading 'under cap' cannot collectively overshoot it; a reply is exempt (it answers a human turn)", ev: integration, gate: cold_start_no_cringe }
      - { id: cold_revival,      must: "atmosphere cold-trigger fires once per cooldown and sends via outbound (suppressed under stay_silent)", ev: integration }
      - { id: periodic_activity, must: "periodic activity types (topic_day/quiz) are triggered by the activity.due scheduler tick in the workspace timezone; activity.rejected returns the proposal to the planner (dropped/rescheduled, not left pending)", ev: integration }
      - { id: event_driven_activity, must: "opportunistic activity types (ai_news_discussion/poll_survey) are triggered by message.clean hot/surging-topic detection (NOT the scheduler tick), debounced by the per-type cooldown so a busy room cannot spam proposals; activities.executed_at + status='executed' is stamped ONLY on outbound.sent(kind:'activity'), never at plan time; approval authority for L1 types lives in approval_items, not the activities row", ev: integration }
      - { id: engaged_attribution, must: "the primary metric 'engaged' is observed from the bus — a subsequent human message.clean in the SAME channel whose replyTo.messageId == a tracked bot reply (or a positive reaction.received on that channel+message) within attribution_window writes engaged + measured_at to reply_feedback (indexed by (workspace_id, channel_id, bot_message_id) so per-chat ids never mis-attribute across channels), keyed to the reply's styleVariant arm", ev: integration }
      - { id: one_experiment,    must: "at most one running experiment per dimension (DB unique index holds); a power-underpowered challenger is QUEUED, not run", ev: unit }
      - { id: bandit_alloc,      must: "ctx.styling.assign serves the arm via Thompson allocation routing more traffic to the better arm as the Beta posteriors diverge, with challenger share clamped to [floor,cap]; assignment is deterministic per correlationId (reproducible under replay) and is what Persona stamped onto ReplyDraft.styleVariant", ev: unit }
      - { id: gated_promotion,   must: "challenger promoted ONLY when P(challenger>champion)>=promote_prob AND min_exposure met AND no guardrail worse than champion beyond tolerance; a reaction-farming variant that lifts primary but worsens complaint/churn is VETOED", ev: unit }
      - { id: peek_safe,         must: "continuous looks (the rollback watch) do not inflate false-promotion rate — posterior-prob decision is valid under peeking (a fixed-horizon p-value would fail this)", ev: unit }
      - { id: auto_rollback,     must: "a seeded post-promotion regression (primary OR guardrail) auto-reverts to the stored prior STYLE within the watch window", ev: unit }
      - { id: evolution_safety,  must: "a boundary-weakening challenger is rejected before it runs", ev: redteam, gate: evolution_safety }
    verify: just verify-step 8

  - step: 9
    name: Cross-Promotion (hooks only)
    capabilities:
      - { id: passthrough, must: "with CrossPromotion unregistered, the ENGINE bridge (not the Marketing module) forwards reply.enriched -> reply.ready unchanged (deep-equal except owned field); Marketing never emits reply.ready", ev: integration, gate: pipeline_passthrough }
    verify: just verify-step 9

  - step: 10
    name: Relationship Memory
    capabilities:
      - { id: recall_weaves,  must: "recall weaves a prior topic naturally into a reply (flag on)", ev: llm_fixture }
      - { id: opt_out_null,   must: "opted-out user => recall returns null, collection stops", ev: privacy_data, gate: retention_and_erasure }
      - { id: forget_purges,  must: "/forget erases note AND purges raw messages", ev: privacy_data, gate: retention_and_erasure }
      - { id: no_cross_user,  must: "never returns another user's memory", ev: unit }
    verify: just verify-step 10

  - step: 11
    name: Content-Gap Feedback
    capabilities:
      - { id: counts_repeats, must: "a repeated unanswered question increments content_gaps.asked_count", ev: unit }
      - { id: in_digest,      must: "gaps surface in the owner digest", ev: integration }
      - { id: no_identity,    must: "stored question carries no asker identity", ev: unit }
    verify: just verify-step 11

  - step: 12
    name: DM Funnel
    capabilities:
      - { id: lead_signal,   must: "only explicit interest plus supporting engagement emits lead.identified; high engagement alone goes to digest, not DM proposal", ev: integration, gate: dm_funnel_safety }
      - { id: approval_gate, must: "no DM is sent without owner approval on the control bot (autonomy L1); approved => lead.approved -> outbound dm via:'userbot' to the lead, within the account_survival dm_per_day cap; rejected/ttl => lead.rejected and no DM; leads.dm_sent_at + stage='dm_sent' are stamped ONLY on outbound.sent(kind:'dm' to the lead) so the no_response timer starts from real delivery, not from approval; approval authority lives in approval_items (the leads row only mirrors the decision)", ev: integration }
      - { id: lead_suppression, must: "a rejection (proven through lead.rejected), no-response, complaint, opt-out, or prior DM suppresses repeat lead proposals for that user; no-response/rejection create long-lived downgrade, not immediate retry. NO-RESPONSE is detected by the per-workspace lead.followup_due scheduler sweep (absence-of-reply cannot be observed from inbound events alone), measuring from the real dm_sent_at (outbound.sent), and a genuine reply before the window cancels the no_response suppression", ev: integration, gate: dm_funnel_safety }
      - { id: never_member,  must: "a member asking can never trigger a DM (provenance)", ev: redteam, gate: command_conversation_separation }
    verify: just verify-step 12

  - step: 13
    name: Evolution multi-dimension
    capabilities:
      - { id: nonstyle_dim, must: "an experiment on dimension != style (timing/activity_type/marketing_angle) runs the SAME champion/challenger gate + rollback", ev: unit }
      - { id: identity_safe, must: "identity/boundaries/governance are never a dimension", ev: static, gate: evolution_safety }
    verify: just verify-step 13

  - step: 14
    name: Owner Onboarding Wizard
    capabilities:
      - { id: interview,      must: "wizard interviews the owner via DM ON THE CONTROL BOT; owner input arrives as control.owner_action -> Approval forwards onboarding.input(start|answer|confirm) (owner user_id only — the owner cannot DM their own userbot account); onboarding.input is a DEDICATED event, never a piggyback on activity.approved", ev: real_runtime, real: true }
      - { id: valid_config,   must: "emits a persona + sources config that passes the SAME Zod schema as hand-written", ev: unit }
      - { id: bootstrap_write,must: "renders an owner-visible diff, writes config/** ONCE only after explicit owner confirm, uses atomic temp-write+rename with a bootstrap marker, never overwrites a hand-edit without a fresh confirm, and hot-reload picks it up", ev: integration }
      - { id: preconditions,  must: "refuses to go live if the userbot is not a member or its session is invalid, if the control bot token is invalid, or if the control bot lacks admin delete+restrict; tells the owner exactly what to fix (no privacy-mode concept, no safety-rights degradation)", ev: real_runtime, real: true }
    verify: just verify-step 14
