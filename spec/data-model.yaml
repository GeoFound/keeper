# =============================================================================
# DATA MODEL — SQLite (better-sqlite3). The DDL is authoritative.
# =============================================================================

data_model:
  engine: sqlite
  identity_rule: >-
    Unless a column is explicitly named `native_*` or belongs to a pre-routing raw adapter
    table that also carries a separate `platform`, core-table `channel_id` stores canonical
    channel_uid (`<platform>:<nativeChannelId>`) and core-table `user_id` / `*_user_id`
    stores canonical actor_uid (`<platform>:<nativeUserId>`). Config and adapters accept
    native ids; Workspace Router normalization writes canonical ids into read-model/domain
    tables. This avoids a future multi-platform identity migration.
  tables:
    messages: |
      -- Raw message log. Aged out by retention.sweep_due past message_retention_days.
      -- Owner /forget purges all rows for a user_id (forget_purges_raw); the opt_out
      -- keyword does NOT purge here (it only stops relationship memory).
      -- WRITER: the Workspace Router writes/updates this canonical row on message.routed
      -- (post-routing, so workspace_id is known and NOT NULL holds); a genuine edit UPDATES
      -- the existing row in place (is_edit, edit_of, edited_at). A message from a channel
      -- bound to no workspace never reaches routing, so it writes nothing here (zero spend,
      -- no workspace/domain side effects — unbound_channel_drop). Pre-routing replay dedup
      -- still lives in inbound_updates (written by the ingest adapter) and is explicitly
      -- allowed as idempotency infrastructure, not workspace operation.
      CREATE TABLE messages (
        id TEXT PRIMARY KEY,                      -- PLATFORM-QUALIFIED identity `<platform>:<native_channel_id>:<platform_message_id>` (globally unique). NOT the bare platform_message_id: Telegram message ids are per-CHAT and collide across channels. (Same components as correlationId minus the `corr:` prefix.)
        workspace_id TEXT NOT NULL,
        correlation_id TEXT,                      -- envelope correlationId, for tracing
        platform TEXT NOT NULL,
        channel_id TEXT NOT NULL,                 -- canonical channel_uid in core (`<platform>:<native_channel_id>`)
        platform_message_id TEXT,
        sender_id TEXT,                           -- canonical actor_uid in core (`<platform>:<native_user_id>`)
        sender_name TEXT,                         -- UNTRUSTED display string (never an instruction)
        text TEXT,
        media_type TEXT,                          -- image|video|file|sticker (NULL for text)
        media_url TEXT,                           -- TRANSIENT platform reference (e.g. Telegram file id/path) used for media moderation + edit re-moderation; NOT a re-host. NULL for text. The BYTES are never stored, and for a black-tier hit this ref is cleared too — only a tier+reason audit row in moderation_actions remains (never_store_flagged_media).
        -- NOTE: black-tier-flagged media bytes are NEVER stored; only an audit row in
        -- moderation_actions records tier+reason (and media_url above is cleared on a black-tier hit).
        is_edit BOOLEAN DEFAULT FALSE,            -- this row is an edit (re-moderated, never re-replied)
        edit_of TEXT,                             -- original platform_message_id this edit replaces
        is_bot_reply BOOLEAN DEFAULT FALSE,
        reply_to_id TEXT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        edited_at DATETIME,                         -- latest platform edit timestamp/revision, if any
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      -- One canonical row per platform message. A genuine edit updates this row in place;
      -- redelivered non-edit updates become no-op by this unique key.
      CREATE UNIQUE INDEX ux_messages_platform_identity
        ON messages (platform, channel_id, platform_message_id);
    inbound_updates: |
      -- Idempotency + crash-recovery guard for inbound platform updates. This separates
      -- replayed updates from genuine edits before any pipeline work starts, AND tracks each
      -- update's processing lifecycle so a crash mid-journey COMPLETES instead of being lost.
      -- A genuine edit has update_kind='edit' plus a distinct update_identity (Telegram update
      -- id / edit_date / pts) and proceeds to re-moderation; multiple edits to the same
      -- platform_message_id must each pass once; replaying the same edit revision is the no-op.
      -- WRITER: the inbound (userbot) Platform Adapter / engine ingest CLAIMS this row (INSERT
      -- status='pending') BEFORE emitting message.received. DELIVERY SEMANTICS are by status +
      -- the process's in-flight set, NOT a blanket stop (the old blanket stop silently LOST a
      -- message if the process died after the claim but before any durable downstream side
      -- effect existed). For an arriving update U:
      --   1. a 'committed' row exists  => true replay of fully-processed work => STOP (downstream
      --      already happened and is guarded by outbox/moderation_actions).
      --   2. a 'pending' row exists AND U is in THIS process's in-flight set => a concurrent
      --      duplicate delivery of a journey still running here => STOP (the original finishes or
      --      is re-driven; do not double-journey concurrently).
      --   3. otherwise (no row, OR a 'pending' row NOT in this process's in-flight set — i.e.
      --      claimed by a prior, since-crashed process) => (re)claim 'pending', add to in-flight,
      --      and JOURNEY. This is what lets a post-crash PLATFORM REPLAY (MTProto replays un-acked
      --      updates, and the replay carries the full content) reprocess a message whose journey
      --      died — including the window BEFORE the messages row was written, which a restart
      --      re-drive cannot reconstruct. Re-journeying is SAFE: every non-idempotent downstream
      --      action is execute-once guarded (outbox dedupe_key, moderation_actions.action_key) and
      --      the messages-row upsert dedups the write; read-model counters may be re-touched at
      --      most once per crashed row, which is bounded and self-heals in the rolling windows.
      -- COMMIT POINT: the engine flips status->'committed' (set committed_at) when the message
      -- reaches its terminal, idempotently-guarded outcome — i.e. once EVERY non-idempotent side
      -- effect is either done-and-guarded or decided-not-to-happen: a reply outbox row was written
      -- (reply:<correlationId>), OR Intent Router journaled decision.no_reply, OR Moderation
      -- claimed a moderation_actions.action_key / reached message.clean with no reactive send.
      -- RESTART RE-DRIVE (covers a crash where the platform does NOT redeliver): on startup the
      -- engine scans inbound_updates WHERE status='pending' AND received_at within
      -- reply.max_staleness + margin, and for those that HAVE a persisted `messages` row RE-DRIVES
      -- them by re-resolving + re-emitting message.routed, so a crash AFTER routing persisted but
      -- before the commit point still completes without waiting on a platform replay. A pending
      -- row with NO messages row (crash before routing) is left to platform redelivery (rule 3) —
      -- its content was never stored, so there is nothing to re-drive and nothing was committed.
      -- A 'pending' row older than the window is marked 'committed' WITHOUT re-drive (stale
      -- trigger — mirrors the outbox stale-drop). This guard is pre-routing, so it carries NO
      -- workspace_id (the canonical messages row, written later by the Workspace Router, does).
      CREATE TABLE inbound_updates (
        id TEXT PRIMARY KEY,                         -- upd:<platform>:<channel>:<message>:<kind>:<identity>
        platform TEXT NOT NULL,
        channel_id TEXT NOT NULL,                    -- native adapter channel id; pre-routing raw row is keyed with platform
        platform_message_id TEXT NOT NULL,
        update_kind TEXT NOT NULL,                   -- message|edit
        update_identity TEXT NOT NULL,               -- original message id, or per-edit revision/update id
        correlation_id TEXT NOT NULL,
        status TEXT DEFAULT 'pending',               -- pending|committed (lifecycle; drives conflict + restart re-drive)
        received_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        committed_at DATETIME,                       -- set when the journey reaches its terminal guarded outcome
        UNIQUE(platform, channel_id, platform_message_id, update_kind, update_identity)
      );
      CREATE INDEX ix_inbound_updates_pending
        ON inbound_updates (status, received_at);
    reply_feedback: |
      CREATE TABLE reply_feedback (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        channel_id TEXT NOT NULL,                 -- canonical channel_uid; bot_message_id is per native chat, so attribution is matched by (channel_uid, bot_message_id), never bot_message_id alone
        correlation_id TEXT,                      -- links the whole reply journey
        bot_message_id TEXT NOT NULL,             -- bare platform message id of the bot reply, unique only WITHIN channel_id
        bot_reply_text TEXT,
        reply_count INTEGER DEFAULT 0,
        reaction_count INTEGER DEFAULT 0,
        positive_reactions INTEGER DEFAULT 0,
        negative_reactions INTEGER DEFAULT 0,     -- brake signal
        was_quoted BOOLEAN DEFAULT FALSE,
        user_complained BOOLEAN DEFAULT FALSE,    -- brake signal (sentiment on replies-to-bot)
        member_left_after BOOLEAN DEFAULT FALSE,  -- brake signal
        deleted_by_admin BOOLEAN DEFAULT FALSE,   -- brake signal (best-effort/platform-dependent)
        intent_category TEXT,
        had_marketing BOOLEAN DEFAULT FALSE,
        style_variant TEXT,                       -- 'champion' | 'challenger' (experiment arm)
        stratum TEXT,                             -- intent_category|time_bucket|had_marketing
        composite_score REAL,                     -- computed at measurement time
        knowledge_sources_used TEXT,
        engaged INTEGER,                          -- the PRIMARY metric (0/1), written at measurement time (NULL until measured)
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        measured_at DATETIME
      );
      -- Index for the engaged-metric attribution lookup (modules.yaml evolution.primary_metric):
      -- match a subsequent human reply/quote (message.clean.channelId + replyTo.messageId) or
      -- reaction (reaction.received.channelId + messageId) to a tracked bot reply within the
      -- attribution window. Keyed by (workspace_id, channel_id, bot_message_id) so a per-chat
      -- bot_message_id cannot mis-attribute across channels.
      CREATE INDEX ix_reply_feedback_botmsg ON reply_feedback (workspace_id, channel_id, bot_message_id);
    style_memory: |
      CREATE TABLE style_memory (
        workspace_id TEXT PRIMARY KEY,
        preferred_expressions TEXT,
        preferred_emoji TEXT,
        avg_response_length INTEGER,
        high_engagement_topics TEXT,
        low_engagement_topics TEXT,
        custom_prompt_additions TEXT,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    evolution_log: |
      CREATE TABLE evolution_log (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        reflection_text TEXT,
        prompt_adjustments TEXT,
        style_updates TEXT,
        sample_count INTEGER,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    evolution_experiments: |
      -- One Bayesian champion/challenger experiment on the STYLE prompt section.
      -- Beta posteriors over the PRIMARY metric (engaged, Bernoulli) + guardrail rates.
      -- This table is what makes evolution falsifiable, decidable-at-any-n, and reversible.
      CREATE TABLE evolution_experiments (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        status TEXT DEFAULT 'running',            -- queued|running|promoted|rejected|rolled_back
        champion_prompt TEXT NOT NULL,            -- live STYLE at experiment start (the prior, for rollback)
        challenger_prompt TEXT NOT NULL,
        -- Beta(α,β) posteriors over the primary metric (engaged). Init (1,1).
        champion_alpha REAL DEFAULT 1, champion_beta REAL DEFAULT 1,
        challenger_alpha REAL DEFAULT 1, challenger_beta REAL DEFAULT 1,
        champion_samples INTEGER DEFAULT 0,
        challenger_samples INTEGER DEFAULT 0,
        -- Thompson allocation clamp (challenger share kept within [floor,cap])
        challenger_ratio_floor REAL DEFAULT 0.05,
        challenger_ratio_cap REAL DEFAULT 0.5,
        min_exposure INTEGER DEFAULT 30,          -- min challenger replies before a promotion can fire
        promote_prob REAL DEFAULT 0.95,           -- P(challenger>champion) bar (peek-safe Bayesian)
        posterior_prob_better REAL,               -- P(θ_challenger > θ_champion), computed at each look
        -- guardrail rates (challenger vetoed if any worse than champion beyond tolerance)
        guardrail_json TEXT,                      -- {complaint_rate, member_left_rate, negative_reaction_rate, admin_deleted_rate} per arm + tolerances
        baseline_alpha REAL, baseline_beta REAL,  -- pre-promotion champion posterior, watched for regression
        composite_score REAL,                     -- SECONDARY diagnostic only (not the decision)
        decision_reason TEXT,
        approved_by_owner BOOLEAN,                -- when auto_tune off
        dimension TEXT DEFAULT 'style',          -- style|timing|activity_type|marketing_angle (evolution multi-dim)
        started_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        decided_at DATETIME,
        rolled_back_at DATETIME
      );
      -- Enforce evolution.experiment.one_active_per_dimension at the DB level:
      -- at most one running experiment per (workspace, dimension).
      CREATE UNIQUE INDEX ux_one_running_experiment
        ON evolution_experiments (workspace_id, dimension)
        WHERE status = 'running';
    shared_insights: |
      CREATE TABLE shared_insights (
        id TEXT PRIMARY KEY,
        category TEXT NOT NULL,
        description TEXT NOT NULL,
        confidence REAL DEFAULT 0.5,
        sample_count INTEGER DEFAULT 0,
        derived_from TEXT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    activities: |
      -- Activity Planner/Executor DOMAIN table: the plan + its EXECUTION lifecycle. It does
      -- NOT own approval authority — owner approval for L1 types (giveaway/cost_bearing) lives
      -- in approval_items (the single persistent decision store). This table links to that row
      -- by source_item_ref/source_correlation_id for traceability but never duplicates the
      -- approval message id / owner decision (one source of truth). status here is EXECUTION
      -- state, not approval state. executed_at is stamped on outbound.sent (kind:'activity').
      CREATE TABLE activities (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        type TEXT NOT NULL,
        plan TEXT NOT NULL,
        status TEXT DEFAULT 'planned',            -- planned|awaiting_approval|scheduled|executed|cancelled|rejected (EXECUTION lifecycle; approval decision lives in approval_items)
        source_correlation_id TEXT,               -- links the planning journey for /trace
        source_item_ref TEXT,                     -- approval_items.item_ref when this type needed L1 approval (else NULL)
        scheduled_at DATETIME,
        executed_at DATETIME,                     -- stamped when outbound.sent confirms the activity send
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    approval_items: |
      -- The persistent owner-decision queue. Approval authority must survive restarts;
      -- callbacks/reply-to/#id all resolve through this table, never in-memory state.
      CREATE TABLE approval_items (
        item_ref TEXT PRIMARY KEY,                  -- callback_data / #id token
        workspace_id TEXT NOT NULL,
        type TEXT NOT NULL,                        -- moderation|activity|lead|evolution|onboarding|cross_promo
        source_event_id TEXT,
        source_correlation_id TEXT,
        status TEXT DEFAULT 'pending',             -- pending|approved|rejected|amended|expired|cancelled
        safe_default TEXT NOT NULL,                -- reject|hold|drop|cancel|no_decision
        payload_json TEXT NOT NULL,                -- redacted proposal payload, no secrets/media bytes
        approval_message_id TEXT,                  -- control-bot DM message id
        owner_response TEXT,
        amend_text TEXT,
        expires_at DATETIME NOT NULL,
        decided_at DATETIME,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_approval_items_pending
        ON approval_items (workspace_id, status, expires_at);
    marketing_log: |
      CREATE TABLE marketing_log (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        content_source_id TEXT,
        content_item_id TEXT,
        mention_type TEXT,
        engagement_score REAL,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    command_attempts: |
      -- Every time a member tries to command the bot (action request, prompt
      -- injection, or an out-of-scope demand) it is handled SILENTLY and logged
      -- here — for owner visibility + abuse/injection-rate detection. See
      -- contracts.yaml governance.
      CREATE TABLE command_attempts (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        channel_id TEXT,                         -- canonical channel_uid
        sender_id TEXT,                          -- canonical actor_uid
        text TEXT,
        kind TEXT,                               -- action_request|control_override|out_of_scope
        handled TEXT DEFAULT 'silent',
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_command_attempts_subject
        ON command_attempts (workspace_id, sender_id, created_at);
    channel_state: |
      -- Read-model backing SocialContext.assess(): community phase + room temp.
      -- Refreshed on message.clean / member events; queried by Intent Router +
      -- Atmosphere so the whole engine shares one notion of "度".
      CREATE TABLE channel_state (
        channel_id TEXT PRIMARY KEY,              -- canonical channel_uid (`<platform>:<native_channel_id>`)
        workspace_id TEXT NOT NULL,
        member_count INTEGER DEFAULT 0,
        active_members_24h INTEGER DEFAULT 0,
        messages_24h INTEGER DEFAULT 0,
        phase TEXT DEFAULT 'seed',               -- seed|spark|grow|mature
        temperature TEXT DEFAULT 'silent',       -- silent|calm|lively|heated|argument
        last_human_message_at DATETIME,
        last_bot_message_at DATETIME,
        consecutive_bot_messages INTEGER DEFAULT 0,
        paused_until DATETIME,                   -- kill switch: fully silent until (owner /pause)
        proactive_paused_until DATETIME,         -- /quiet: proactive off, moderation stays
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    channel_members: |
      -- Per-(workspace,channel,user) presence read-model. This is what makes the
      -- new_user_link_delay / new_user_media_delay moderation rules ENFORCEABLE: those rules
      -- restrict a user for the first N minutes of presence, which needs a persisted join /
      -- first-seen timestamp (member.joined is a transient event; channel_state holds only
      -- aggregates). Sole writer is the SocialContext channel_state updater (it already
      -- consumes member.joined / member.left / message.clean — see contracts SocialContext):
      --   * member.joined -> set joined_at + first_seen_at (if absent) + status='active'
      --   * first message.clean from a user with no row -> create row with first_seen_at=now
      --     (fallback when the bot joined AFTER the user, so joined_at is unknown/missed)
      --   * EVERY message.clean -> bump last_seen_at (presence recency)
      --   * member.left -> set left_at + status='left'
      -- Read by Moderation via ctx.social (memberPresence). "New user" for the link/media
      -- delay = no row yet (this is the first observation) OR now - first_seen_at < the
      -- configured delay; using first_seen_at (earliest of join or first message) keeps the
      -- fresh-account fail-safe conservative for accounts that joined before the bot.
      CREATE TABLE channel_members (
        workspace_id TEXT NOT NULL,
        channel_id TEXT NOT NULL,                 -- canonical channel_uid
        user_id TEXT NOT NULL,                    -- canonical actor_uid
        joined_at DATETIME,                      -- from member.joined; NULL if joined before the bot / event missed
        first_seen_at DATETIME DEFAULT CURRENT_TIMESTAMP, -- earliest of join or first observed message (the new-user clock)
        last_seen_at DATETIME,
        left_at DATETIME,
        status TEXT DEFAULT 'active',            -- active|left
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (workspace_id, channel_id, user_id)
      );
      CREATE INDEX ix_channel_members_recent
        ON channel_members (workspace_id, channel_id, first_seen_at);
    workspace_runtime_state: |
      -- Durable operational state for holds that are not human /pause: cost read-only,
      -- missing required platform rights, adapter auth/access failures, per-channel userbot
      -- membership loss, and safety/media holds. This is MULTI-ROW by design: a workspace can
      -- be read_only for budget while one channel is degraded because the userbot was kicked.
      -- /status and the owner digest read active rows so a restart does not hide a degraded state.
      -- SOLE ACCESSOR: the RuntimeStateService (ctx.runtime — contracts.yaml). No module or adapter
      -- writes this table directly (table_ownership gate); module callers go through ctx.runtime and
      -- infra callers (LLMGateway budget/safety exhaustion, the userbot/control adapters on
      -- membership/rights/auth loss, AccountSurvival on account-wide retreat) through a direct engine
      -- reference. enter() is an IDEMPOTENT upsert on the UNIQUE key below; on a no-active-row ->
      -- active TRANSITION (only) it emits EXACTLY ONE out-of-band owner alert via
      -- outbound.requested(kind:'notice', via:'control', suppressIfKillSwitch=false,
      -- dedupeKey=`system_notice:runtime:<id>`) — the single owner-alert path the spec promises for
      -- every runtime hold, deduped so a flapping condition can't spam the owner; resolve() clears the
      -- row. EXCEPTION: a control-bot TOKEN invalidity records its row here but cannot DM via the dead
      -- control bot, so that one reason surfaces through process health, not a control-bot notice
      -- (overview platform_prerequisites.session_validity; contracts RuntimeStateService).
      CREATE TABLE workspace_runtime_state (
        id TEXT PRIMARY KEY,                       -- runtime:<workspace>:<scope_type>:<scope_id>:<mode>:<reason>
        workspace_id TEXT NOT NULL,
        scope_type TEXT NOT NULL,                  -- workspace|channel|source|account
        scope_id TEXT NOT NULL,                    -- workspace_id, canonical channel_uid, source_id, or account_id
        channel_id TEXT,                           -- canonical channel_uid when scope_type='channel'
        mode TEXT NOT NULL,                        -- read_only|safety_hold|media_hold|degraded|disabled|retreat
        reason TEXT NOT NULL,                      -- budget_exhausted|media_cap|missing_rights|userbot_not_member|invalid_session|...
        status TEXT DEFAULT 'active',              -- active|resolved
        details_json TEXT,                         -- redacted, no secrets/media bytes
        until DATETIME,
        resolved_at DATETIME,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(workspace_id, scope_type, scope_id, mode, reason)
      );
      CREATE INDEX ix_workspace_runtime_active
        ON workspace_runtime_state (workspace_id, status, mode, until);
      CREATE INDEX ix_workspace_runtime_channel
        ON workspace_runtime_state (workspace_id, channel_id, status);
    safety_holds: |
      -- Bounded fail-closed queue for classifier outages, media scan cap exhaustion,
      -- missing required safety rights, and other conditions where passing as clean would
      -- be unsafe. Holds are silent to members and summarized to the owner by /status/digest.
      CREATE TABLE safety_holds (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        channel_id TEXT,                          -- canonical channel_uid
        target_user_id TEXT,                      -- canonical actor_uid
        platform_message_id TEXT,
        modality TEXT,                           -- text|media|mixed
        reason_code TEXT NOT NULL,               -- classifier_timeout|parse_error|media_cap|missing_rights|provider_outage
        collapsed_key TEXT NOT NULL,             -- workspace:user/reason/modality bucket for dedupe
        status TEXT DEFAULT 'held',              -- held|released|expired|silent_deleted
        default_action TEXT NOT NULL,            -- expire_drop|silent_delete_unscanned|owner_review
        expires_at DATETIME NOT NULL,
        owner_notified_at DATETIME,
        details_json TEXT,                       -- redacted; no raw media bytes/secrets
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_safety_holds_open ON safety_holds (workspace_id, status, expires_at);
    knowledge_items: |
      CREATE TABLE knowledge_items (
        id TEXT PRIMARY KEY,
        source_id TEXT NOT NULL,
        type TEXT,
        title TEXT,
        url TEXT,
        canonical_url TEXT,
        tags TEXT,
        language TEXT,
        content_type TEXT,
        source_trust TEXT DEFAULT 'owned',       -- owned|partner|rss|crawl|user_file
        workspace_priority REAL DEFAULT 1.0,     -- per-SOURCE ranking prior, identical for every workspace binding this source (not per-(workspace,source) — knowledge.yaml priority_scope)
        chunk_count INTEGER,
        content_hash TEXT,
        created_at DATETIME,
        updated_at DATETIME,
        freshness_at DATETIME,
        synced_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    source_sync_state: |
      -- Per-source incremental sync checkpoint. Supports cursor/since pagination,
      -- restart-safe resumption, and embedding-model compatibility checks.
      CREATE TABLE source_sync_state (
        source_id TEXT PRIMARY KEY,
        adapter TEXT NOT NULL,
        cursor TEXT,
        since DATETIME,
        last_success_at DATETIME,
        last_error TEXT,
        last_item_updated_at DATETIME,
        stale_after DATETIME,
        embedding_model TEXT,
        embedding_dim INTEGER,
        full_reembed_required BOOLEAN DEFAULT FALSE,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    knowledge_chunks: |
      -- Text chunks used by RAG. source_id is the isolation key; embedding_model/dim make
      -- model changes detectable instead of silently mis-scoring vectors.
      CREATE TABLE knowledge_chunks (
        id TEXT PRIMARY KEY,                       -- source:item:chunk_index:content_hash
        source_id TEXT NOT NULL,
        item_id TEXT NOT NULL,
        chunk_index INTEGER NOT NULL,
        title TEXT,
        text TEXT NOT NULL,
        url TEXT,
        canonical_url TEXT,
        content_type TEXT,
        source_trust TEXT DEFAULT 'owned',
        workspace_priority REAL DEFAULT 1.0,     -- per-SOURCE ranking prior (see knowledge_items.workspace_priority / knowledge.yaml priority_scope)
        content_hash TEXT NOT NULL,
        embedding_model TEXT NOT NULL,
        embedding_dim INTEGER NOT NULL,
        freshness_at DATETIME,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(source_id, item_id, chunk_index, content_hash)
      );
      CREATE INDEX ix_knowledge_chunks_source
        ON knowledge_chunks (source_id, item_id);
    knowledge_vectors: |
      -- sqlite-vec virtual table. The dimension is NOT a literal — the migration TEMPLATES
      -- it from config llm.models.embedding's dimension (embedding_dim), i.e. the DDL emitted
      -- at migration time is `embedding float[${embedding_dim}]`. The 1536 shown below is ONLY
      -- an illustrative value for text-embedding-3-small; a different embedding model changes
      -- both the literal AND requires a full re-embed (see knowledge.yaml embedding_compatibility).
      -- knowledge_vector_map links sqlite rowid back to knowledge_chunks; queries must
      -- pre-filter candidate chunk_ids by allowed source_id before/during KNN, never
      -- post-filter the global top-K.
      -- DIMENSION IS FIXED AT CREATE TIME: changing the embedding model to one with a
      -- different dimension is a FORWARD-ONLY SCHEMA MIGRATION (DROP + re-CREATE this table
      -- with the new float[${new_dim}] + clear knowledge_vector_map + full re-embed), NOT a
      -- plain re-insert — you cannot store a 3072-dim vector in a float[1536] table. See
      -- knowledge.yaml embedding_compatibility.dimension_change_is_a_schema_migration.
      CREATE VIRTUAL TABLE knowledge_vectors USING vec0(
        embedding float[${embedding_dim}]   -- templated at migration from config (e.g. 1536 for text-embedding-3-small)
      );
    knowledge_vector_map: |
      -- Stable mapping between sqlite-vec rowid and knowledge_chunks.id. Keeping source_id
      -- here lets the vector worker build the allowed candidate set before KNN.
      CREATE TABLE knowledge_vector_map (
        chunk_id TEXT PRIMARY KEY,
        vector_rowid INTEGER NOT NULL UNIQUE,
        source_id TEXT NOT NULL,
        embedding_model TEXT NOT NULL,
        embedding_dim INTEGER NOT NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_knowledge_vector_map_source
        ON knowledge_vector_map (source_id, vector_rowid);
    daily_budget_state: |
      -- Atomic reserve-not-check budget state for the WORKSPACE-SCOPED lanes (generative +
      -- safety/media). LLMGateway atomically RESERVES an estimate against the day's remaining
      -- budget BEFORE the call, then reconciles on completion. RESERVATION RELEASE IS MANDATORY:
      -- on ANY non-completing path (LLM error/timeout, pipeline abort, watchdog hang-abort, parse
      -- failure) the reserved estimate is RELEASED (reserved -= estimate) and NO actual is
      -- appended — otherwise a workspace with intermittent failures slowly buries its budget under
      -- phantom reservations and trips to read_only/media_hold with no real spend. On success the
      -- estimate is released and the ACTUAL is booked (reserved -= estimate; actual += real;
      -- llm_usage row appended). So reserved is a transient in-flight ceiling that always returns
      -- to ~0 between bursts. NOTE: the day row is created once per (workspace, day) via an
      -- idempotent upsert (INSERT .. ON CONFLICT DO NOTHING) seeded from config budgets, so a
      -- day-rollover race cannot create two rows. INGEST IS NOT HERE: ingest is source-scoped (a
      -- source serves many workspaces) and lives in ingest_budget_state — see that table and
      -- overview operations.cost_circuit_breaker.budget_lanes.
      CREATE TABLE daily_budget_state (
        workspace_id TEXT NOT NULL,
        day TEXT NOT NULL,                         -- YYYY-MM-DD in workspace timezone
        generative_budget_usd REAL NOT NULL,
        safety_budget_usd REAL NOT NULL,
        media_scan_cap INTEGER NOT NULL,
        generative_reserved_usd REAL DEFAULT 0,    -- transient in-flight ceiling; released on success OR failure
        generative_actual_usd REAL DEFAULT 0,
        safety_reserved_usd REAL DEFAULT 0,
        safety_actual_usd REAL DEFAULT 0,
        media_scans_reserved INTEGER DEFAULT 0,
        media_scans_used INTEGER DEFAULT 0,
        media_hold_until DATETIME,
        read_only_until DATETIME,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (workspace_id, day)
      );
    ingest_budget_state: |
      -- SOURCE-SCOPED ingest budget lane. Knowledge sync is fired PER SOURCE (knowledge.sync_due
      -- carries sourceId, empty workspaceId — events.yaml), and a source may be bound to MANY
      -- workspaces, so ingest has NO single owner workspace and CANNOT draw from a per-workspace
      -- lane. It is metered here, keyed by (source_id, day-in-server-tz — a source has no
      -- human-facing local time). Same reserve-not-check + mandatory release-on-failure discipline
      -- as daily_budget_state. Over the per-source ingest cap, that SOURCE's sync PAUSES and
      -- resumes next day; it never touches any workspace's generative/safety lane, and a paused
      -- source never blocks chat. A large FIRST sync and the full re-embed on a dimension change
      -- (knowledge.yaml embedding_compatibility) both run under this lane.
      CREATE TABLE ingest_budget_state (
        source_id TEXT NOT NULL,
        day TEXT NOT NULL,                         -- YYYY-MM-DD (server tz; a source has no workspace-local time)
        ingest_budget_usd REAL NOT NULL,           -- per-source/day cap, defaulted from config llm.budget.ingest_daily_usd
        ingest_reserved_usd REAL DEFAULT 0,        -- transient; released on success OR failure
        ingest_actual_usd REAL DEFAULT 0,
        paused_until DATETIME,                     -- set when the source's ingest cap is exhausted
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (source_id, day)
      );
    llm_usage: |
      -- Cost/audit ledger for ALL LLM lanes. Workspace-scoped generative/safety calls append
      -- scope_type='workspace' rows keyed by workspace_id/day (workspace timezone) and are
      -- bounded by daily_budget_state. Source-scoped ingest/embedding calls append
      -- scope_type='source' rows keyed by source_id/day (server timezone) and are bounded by
      -- ingest_budget_state. This avoids forcing a shared source's re-embed into an arbitrary
      -- workspace while preserving one audit surface for model/purpose breakdowns.
      CREATE TABLE llm_usage (
        id INTEGER PRIMARY KEY,
        scope_type TEXT NOT NULL,                  -- workspace|source
        scope_id TEXT NOT NULL,                    -- workspace_id when workspace-scoped; source_id when source-scoped
        workspace_id TEXT,                         -- set iff scope_type='workspace'
        source_id TEXT,                            -- set iff scope_type='source'
        day TEXT NOT NULL,                         -- YYYY-MM-DD in the scope's day basis
        day_timezone TEXT NOT NULL,                -- workspace timezone OR "server"
        model TEXT NOT NULL,
        purpose TEXT NOT NULL,                     -- chat|classifier|reflection|moderation_vision|embedding|ingest
        tokens_in INTEGER DEFAULT 0,
        tokens_out INTEGER DEFAULT 0,
        cost_usd REAL DEFAULT 0,
        calls INTEGER DEFAULT 0,
        CHECK (
          (scope_type = 'workspace' AND workspace_id = scope_id AND source_id IS NULL) OR
          (scope_type = 'source' AND source_id = scope_id AND workspace_id IS NULL)
        ),
        UNIQUE(scope_type, scope_id, day, model, purpose)
      );
      CREATE INDEX ix_llm_usage_workspace
        ON llm_usage (workspace_id, day, purpose)
        WHERE scope_type = 'workspace';
      CREATE INDEX ix_llm_usage_source
        ON llm_usage (source_id, day, purpose)
        WHERE scope_type = 'source';
    user_memory: |
      -- Per-user relationship memory (feature_flag user_memory, default OFF).
      -- Stores a DISTILLED summary, never raw logs. Privacy-bounded + opt-out.
      CREATE TABLE user_memory (
        workspace_id TEXT NOT NULL,
        user_id TEXT NOT NULL,                    -- canonical actor_uid
        display_name TEXT,
        summary TEXT,                            -- distilled note, not transcripts
        topics TEXT,                             -- json array
        last_seen DATETIME,
        opted_out BOOLEAN DEFAULT FALSE,         -- true -> no recall, no collection
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (workspace_id, user_id)
      );
    member_suppression: |
      -- Cross-feature, PER-USER suppression: reply, DM, memory, or all. The SuppressionService
      -- (ctx.suppression — see contracts SuppressionService) is the SOLE ACCESSOR: modules read via
      -- isSuppressed() and write via suppress()/clear(), NEVER by touching this table directly (the
      -- no-ad-hoc-state architecture gate). Rows originate from explicit member opt-out phrases
      -- (Intent Router), owner /mute-bot-for-user (Approval), funnel rejection/no-response (Funnel),
      -- and a member's own complaint/opt-out. NOTE: the CHANNEL-level auto-quiet tally (multi-user
      -- complaint / negative reaction) is NOT stored here — this table is per-user and has no
      -- channel_id — it lives in channel_negative_signals, which SocialContext reads to derive quiet
      -- posture. The two per-USER intentional signals (owner_mute, no_response/rejected_dm) are
      -- recorded here and never auto-quiet a whole channel.
      CREATE TABLE member_suppression (
        workspace_id TEXT NOT NULL,
        user_id TEXT NOT NULL,                    -- canonical actor_uid
        scope TEXT NOT NULL,                      -- reply|dm|memory|all
        reason TEXT NOT NULL,                     -- phrase|owner_mute|complaint|negative_reaction|no_response|rejected_dm|opt_out
        source_correlation_id TEXT,
        expires_at DATETIME,                      -- NULL = indefinite
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (workspace_id, user_id, scope)
      );
      CREATE INDEX ix_member_suppression_active
        ON member_suppression (workspace_id, scope, expires_at);
    channel_negative_signals: |
      -- Per-(workspace,channel) ROLLING tally of the two ALWAYS-AVAILABLE channel-level complaint
      -- signals, and the ONLY backing for auto-quiet (suppression_complaint_loop). SuppressionService
      -- is the SOLE WRITER: recordNegativeSignal() appends one timestamped row for
      -- signal IN ('complaint','negative_reaction'). SocialContext is a READ-ONLY consumer: assess()
      -- counts DISTINCT user_id within suppression.negative_feedback_window_minutes and, when that
      -- count reaches suppression.negative_feedback_quiet_threshold, DERIVES a reduced-reply /
      -- observe_only posture AT READ TIME — it never writes channel_state for this, nor this table.
      -- That is a one-way read-model handoff, EXACTLY like the Approval Service owning
      -- channel_state.paused_until / proactive_paused_until while SocialContext only reads them;
      -- neither table's writer touches the other's. Counting DISTINCT users (not raw rows) is
      -- deliberate: one member reacting angrily many times is not a quorum — "MULTIPLE members are
      -- unhappy" is what sets quiet posture (acceptance suppression_quiet / suppression_controls).
      -- SCOPE: the per-USER INTENTIONAL signals never land here — owner_mute (owner) and
      -- no_response / rejected_dm (Funnel) are recorded ONLY as member_suppression rows; they are
      -- not a room-temperature signal and must not auto-quiet a whole channel.
      -- A reaction is "negative" per config suppression.negative_reaction_emojis (the same classifier
      -- behind reply_feedback.negative_reactions). Append-only; rows older than the window carry no
      -- live meaning and are pruned by retention.sweep_due (bounded growth).
      CREATE TABLE channel_negative_signals (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        channel_id TEXT NOT NULL,                 -- canonical channel_uid
        user_id TEXT NOT NULL,                    -- canonical actor_uid; DISTINCT-user count crosses the threshold
        signal TEXT NOT NULL,                     -- complaint|negative_reaction (channel-level only; never owner_mute/no_response)
        bot_message_id TEXT,                      -- the bot message complained about / negatively reacted to, when applicable
        source_correlation_id TEXT,               -- the journey that produced the signal (traceability into event_journal)
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_channel_negative_signals_window
        ON channel_negative_signals (workspace_id, channel_id, created_at);
    content_gaps: |
      -- Community -> content reverse signal. Paraphrased question, no asker identity.
      CREATE TABLE content_gaps (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        question TEXT NOT NULL,
        asked_count INTEGER DEFAULT 1,
        top_score REAL,                          -- best RAG score (below threshold)
        suggested_source_id TEXT,
        stale_source_hit BOOLEAN DEFAULT FALSE,
        low_trust_hit BOOLEAN DEFAULT FALSE,
        canonical_url TEXT,
        first_asked_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        last_asked_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    leads: |
      -- DM funnel (feature_flag funnel, default OFF). A DM is governance-gated.
      CREATE TABLE leads (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT NOT NULL,
        channel_id TEXT,                          -- canonical channel_uid
        user_id TEXT NOT NULL,                    -- canonical actor_uid
        stage TEXT DEFAULT 'identified',         -- identified|proposed|dm_sent|converted|dropped
        signal TEXT,
        evidence_json TEXT,                      -- why this is a lead; shown to owner
        suppression_reason TEXT,
        suppression_until DATETIME,
        last_owner_decision TEXT,                -- approved|rejected|ignored|amended — denormalized mirror, learned from the lead.approved/rejected event (the AUTHORITATIVE owner-decision row is in approval_items, not here)
        no_response_at DATETIME,
        source_item_ref TEXT,                    -- approval_items.item_ref for the DM's L1 approval (the owner-decision authority; this table no longer duplicates the approval message id)
        dm_sent_at DATETIME,                     -- stamped when outbound.sent confirms the lead DM (kind:'dm' to the lead); the no_response timer starts here, not at approval
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_leads_subject
        ON leads (workspace_id, user_id, created_at);
    outbox: |
      -- Backs idempotent_delivery + send_queue for EVERY send (reply.generated AND
      -- outbound.requested). A row is written 'pending' BEFORE the platform call and
      -- moved to 'sending' with a lease immediately BEFORE the platform call. On confirm it
      -- is marked 'sent'. On restart the bot reconciles by phase: 'pending' rows have not
      -- called Telegram yet and may send if still fresh; expired 'sending' rows are unknown
      -- remote outcomes and become 'ambiguous' on Telegram unless platform-specific
      -- reconciliation proves otherwise. The engine never blindly retries an unknown remote
      -- send; ambiguity is surfaced to owner trace/status/digest.
      -- PRUNING: terminal rows older than delivery.outbox_prune_after_days are swept
      -- (idempotent_delivery.outbox_pruning), EXCEPT member-notice rows
      -- (kind='notice' AND dedupe_key prefixed `member_notice:`) — the once-ever pinned
      -- disclosure, whose row is the durable per-channel "already disclosed" guard a future
      -- member.joined can still reference, so it is NEVER pruned. System notices use
      -- `system_notice:*` keys and prune normally.
      CREATE TABLE outbox (
        dedupe_key TEXT PRIMARY KEY,             -- KIND-NAMESPACED (idempotent_delivery.dedupe_key_namespace): replies use `reply:<correlationId>`, proactive sends use OutboundMessage.dedupeKey (`<kind>:<...>`, e.g. welcome:<ch>:<user>). The namespace is what keeps the reply and proactive key spaces from colliding in this shared PK.
        workspace_id TEXT NOT NULL,
        correlation_id TEXT,
        platform TEXT DEFAULT 'telegram',
        via TEXT NOT NULL,                       -- userbot|control (for Telegram); enough to pick the send queue on retry
        channel_id TEXT,                         -- canonical channel_uid for channel sends
        dm_user_id TEXT,                         -- canonical actor_uid for DMs
        kind TEXT NOT NULL,                      -- reply|proactive_post|welcome|activity|digest|dm|notice
        payload_json TEXT NOT NULL,              -- serialized OutgoingMessage; no secrets or media bytes; pruned with terminal rows
        suppress_if_kill_switch BOOLEAN DEFAULT TRUE,
        ambiguity_policy TEXT DEFAULT 'at_most_once', -- at_most_once|retry_safe_duplicate
        post_send_actions_json TEXT,             -- e.g. {"pin":true} for member notice; executed after sent
        post_send_status_json TEXT,              -- per-action status/error, redacted
        status TEXT DEFAULT 'pending',           -- pending|sending|sent|dropped|failed|ambiguous
        attempts INTEGER DEFAULT 0,
        not_before DATETIME,                     -- honor scheduled delay / quiet hours
        trigger_at DATETIME,                     -- for staleness reconciliation
        send_started_at DATETIME,                -- set on pending -> sending before platform call
        sending_lease_until DATETIME,             -- expired sending rows reconcile to ambiguous on Telegram
        platform_message_id TEXT,                -- set on 'sent'
        last_error TEXT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        sent_at DATETIME
      );
    platform_actions: |
      -- Execute-once ledger for non-send platform actions owned by Delivery/Platform infra,
      -- currently the member-notice post-send pin. It is deliberately separate from
      -- moderation_actions, whose ownership and semantics are moderation-specific.
      -- A notice is sent by the userbot for persona continuity, but pinning is an admin
      -- action and is executed by the CONTROL BOT. Missing pin rights when member_notice is
      -- enabled is a go-live/runtime hold, not a silent downgrade.
      CREATE TABLE platform_actions (
        action_key TEXT PRIMARY KEY,              -- e.g. plat:<outbox.dedupe_key>:pin
        workspace_id TEXT NOT NULL,
        channel_id TEXT NOT NULL,                 -- canonical channel_uid
        via TEXT NOT NULL,                        -- control for pin today
        action TEXT NOT NULL,                     -- pin_message
        target_message_id TEXT,                   -- platform message id produced by outbox send
        source_dedupe_key TEXT,                   -- outbox row that caused this action
        status TEXT DEFAULT 'claimed',            -- claimed|executed|failed|ambiguous
        reason TEXT,
        last_error TEXT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        executed_at DATETIME
      );
    account_health: |
      -- Account-survival state for the USERBOT only (overview operations.account_survival;
      -- the control bot is a disposable Bot-API bot and is not tracked here).
      -- One row per platform account. Backs the per-account global send ceiling, the
      -- cold-start warm-up curve, FLOOD_WAIT tracking, and RETREAT. RETREAT folds into
      -- SocialContext (posture==stay_silent) so every module obeys it like the kill switch.
      CREATE TABLE account_health (
        account_id TEXT PRIMARY KEY,             -- platform account identity (the owner's user account)
        platform TEXT NOT NULL,
        first_active_at DATETIME,                -- start of the warm-up window
        sends_today INTEGER DEFAULT 0,           -- account-wide (all channels+DMs), reset daily
        dms_today INTEGER DEFAULT 0,
        day TEXT,                                -- YYYY-MM-DD for the counters above
        flood_wait_count INTEGER DEFAULT 0,      -- FLOOD_WAITs in the current window
        flood_window_started_at DATETIME,
        last_flood_wait_seconds INTEGER,
        retreat_until DATETIME,                  -- in RETREAT while now < this (proactive AND reactive off, like /pause)
        session_valid BOOLEAN DEFAULT TRUE,      -- false -> out-of-band owner auth alert
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
    moderation_actions: |
      -- Audit log of every moderation action (delete/mute/ban/escalate). Powers /why,
      -- the daily digest counts (spam blocked, black-tier escalations), and abuse stats.
      -- For black-tier media hits this is the ONLY record kept — tier + reason, NEVER the
      -- media bytes (never_store_flagged_media).
      -- IDEMPOTENCY: this table is ALSO the execute-once ledger for admin actions (the
      -- outbox-equivalent for non-send actions). The CONTROL BOT executor, on consuming a
      -- moderation.violation, atomically CLAIMS the deterministic action_key (INSERT; UNIQUE
      -- conflict => already executed => skip) BEFORE the platform delete/ban/mute, so a
      -- replayed/redelivered moderation.violation (reconnect/crash) never double-acts. This
      -- complements the approval_items.status guard (which stops a double owner-approval) with
      -- execution-level idempotency.
      CREATE TABLE moderation_actions (
        id INTEGER PRIMARY KEY,
        action_key TEXT NOT NULL,                -- deterministic execute-once key `mod:<correlationId>:<action>:<target_message_id|target_user_id>`; UNIQUE -> replayed violation is a no-op
        workspace_id TEXT NOT NULL,
        channel_id TEXT,                          -- canonical channel_uid
        target_user_id TEXT,                      -- canonical actor_uid
        target_message_id TEXT,
        action TEXT NOT NULL,                    -- delete|mute|ban (one per row; delete is auto, mute/ban logged when owner-approved)
        autonomy TEXT,                           -- auto|proposed|approved (mute/ban are owner-confirmed L1)
        tier TEXT,                               -- black|spam|flood
        modality TEXT,                           -- text|media
        reason TEXT,                             -- logged, NEVER shown in-channel (silent)
        escalated BOOLEAN DEFAULT FALSE,         -- true for black-tier owner DM
        status TEXT DEFAULT 'executed',          -- claimed|executed|failed (claimed before the platform call, executed on confirm)
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE UNIQUE INDEX ux_moderation_actions_key ON moderation_actions (action_key);
      CREATE INDEX ix_moderation_actions_target
        ON moderation_actions (workspace_id, target_user_id, created_at);
    event_journal: |
      -- THE single append-only "everything that happened" record — the spine of
      -- observability (overview operations.observability). A bus middleware writes ONE row
      -- per event emission (so the FULL ordered story of any correlationId is one query),
      -- plus modules/engine write synthetic TRACE rows for things that do not emit an event
      -- (e.g. Intent Router deciding NOT to reply, a lifecycle/posture change, a force-abort)
      -- so "why did nothing happen?" is answerable too. causation_id persists the causal
      -- graph the envelope models. payload_digest is REDACTED + size-capped: it NEVER contains
      -- the session string, bot token, API keys, or flagged-media bytes (gate: journal_no_secrets).
      -- SUBJECT STAMPING IS NON-OPTIONAL FOR /forget COMPLETENESS: subject_user_id is NOT guessed
      -- by the middleware. EVERY event whose payload concerns a specific member/actor MUST carry
      -- envelope.subjectUserId (events.yaml envelope.rules), including raw pre-routing events
      -- when sender/actor is known. Raw empty-workspace events are SKELETON ONLY: no message
      -- text, display names, quoted text, owner free-text, media URL, or raw payload enters
      -- payload_digest before routing/approval resolves scope. Synthetic trace rows pass
      -- subjectUserId through ctx.logger.trace. A row that omits subjectUserId is, by contract,
      -- NOT about a single subject and contains no user-scoped text. The privacy model is
      -- three-tiered: audit skeleton (event name/time/correlation/reason code) is retained for
      -- traceability, user payload digest is retention-/forget-bound, and raw message text lives
      -- in messages only with the shortest retention.
      -- Written via a BATCHED async buffer off the receive/send critical path (better-sqlite3
      -- is synchronous — see tech_stack.database); pruned by retention.sweep_due past
      -- observability.journal_retention_days.
      CREATE TABLE event_journal (
        id INTEGER PRIMARY KEY,
        event_id TEXT,                           -- envelope eventId (generated for synthetic trace rows)
        correlation_id TEXT,                     -- the spine: one message's whole journey shares this
        causation_id TEXT,                       -- the eventId that directly caused this (the causal edge)
        workspace_id TEXT,                       -- may be empty for pre-resolution events (message.received/control.owner_action)
        subject_user_id TEXT,                    -- canonical actor_uid when payload_digest/reason contains user-scoped text or user-specific state
        channel_id TEXT,                         -- canonical channel_uid once scoped; raw skeleton rows may carry only non-payload identity metadata
        platform_message_id TEXT,
        contains_user_text BOOLEAN DEFAULT FALSE,
        privacy_tier TEXT DEFAULT 'audit_skeleton', -- audit_skeleton|user_payload_digest
        name TEXT NOT NULL,                      -- event name, OR a trace name (decision.no_reply, lifecycle.posture, pipeline.abort, ...)
        kind TEXT NOT NULL,                      -- event | decision | lifecycle | error
        stage TEXT,                              -- emitting module / pipeline stage
        level TEXT DEFAULT 'info',               -- info | warn | error (for filtering)
        reason TEXT,                             -- human-readable why (esp. for decision/error rows: "posture==stay_silent")
        payload_digest TEXT,                     -- REDACTED, size-capped JSON summary — never secrets/credentials/media bytes
        redacted_at DATETIME,                    -- set by /forget subject redaction, if applicable
        at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      CREATE INDEX ix_journal_corr ON event_journal (correlation_id, at);
      CREATE INDEX ix_journal_ws_time ON event_journal (workspace_id, at);
      CREATE INDEX ix_journal_name ON event_journal (name, at);
      CREATE INDEX ix_journal_subject ON event_journal (workspace_id, subject_user_id, at);
    pipeline_failures: |
      -- Dead-letter + observability for the reply pipeline. A row is written when a stage
      -- THROWS or TIMES OUT (events.yaml failure_policy) or is FORCE-ABORTED by the in-flight
      -- supervisor (events.yaml inflight_supervisor). Read by the Approval Service for the
      -- daily digest ("repeated pipeline-stage failures") and by the production resilience
      -- dead-letter gate. This is the persistence the digest's failure section reads from —
      -- without it those failures would live only in logs and be un-derivable at digest time.
      CREATE TABLE pipeline_failures (
        id INTEGER PRIMARY KEY,
        workspace_id TEXT,                       -- may be empty if the failure precedes workspace resolution
        correlation_id TEXT,
        stage TEXT,                              -- intent|marketing|cross_promotion|persona
        kind TEXT NOT NULL,                      -- error|timeout|hang_aborted
        reason TEXT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );
  ownership:
    # Enforced by overview.yaml quality_gates.architecture.table_ownership.
    # "owner" is the only writer. Other modules read through owner-provided services/repos.
    messages: Workspace Router
    inbound_updates: Delivery/Ingest infra
    reply_feedback: Evolution
    style_memory: Evolution
    evolution_log: Evolution
    evolution_experiments: Evolution
    shared_insights: Evolution
    activities: Activity Planner
    approval_items: Approval Service
    marketing_log: Marketing
    command_attempts: Intent Router
    channel_state: SocialContext
    channel_members: SocialContext
    workspace_runtime_state: RuntimeStateService
    safety_holds: Moderation
    knowledge_items: Content Sync Pipeline
    source_sync_state: Content Sync Pipeline
    knowledge_chunks: Content Sync Pipeline
    knowledge_vectors: Content Sync Pipeline
    knowledge_vector_map: Content Sync Pipeline
    daily_budget_state: LLMGateway
    ingest_budget_state: LLMGateway
    llm_usage: LLMGateway
    user_memory: User Memory
    member_suppression: SuppressionService
    channel_negative_signals: SuppressionService
    content_gaps: Content Gap
    leads: Funnel
    outbox: Delivery/Outbox
    platform_actions: Delivery/Platform
    account_health: AccountSurvival
    moderation_actions: Control Bot executor
    event_journal: Observability
    pipeline_failures: Pipeline supervisor
